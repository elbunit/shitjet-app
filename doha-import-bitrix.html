function log(msg, cls) {
  const el = document.getElementById('log');
  el.innerHTML += '<div class="' + (cls||'') + '">' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function setProgress(n, total) { document.getElementById('prog').style.width = Math.round(n/total*100) + '%'; }

window.ndalo = function() { running = false; };

window.filloBtnClick = async function() {
  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  setStatus('Duke u kycur...');
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
    log('U kyc me sukses!', 'ok');
    fillo();
  } catch(e) {
    log('Gabim kycje: ' + e.message, 'err');
    btn.disabled = false;
  }
};

async function fillo() {
  running = true;
  imported = 0;
  errors = 0;
  document.getElementById('btn-stop').style.display = 'block';
  document.getElementById('btn-start').style.display = 'none';

  const total = SHITJET.length;
  log('Duke filluar importin e ' + total + ' shitjeve...', 'ok');

  const BATCH = 5;
  for (let i = 0; i < total; i += BATCH) {
    if (!running) { log('Ndaluar nga perdoruesi.', 'err'); break; }
    const chunk = SHITJET.slice(i, i + BATCH);
    await Promise.all(chunk.map(async function(s) {
      try {
        await addDoc(collection(db, 'shitjet'), {
          produkti: s.produkti,
          sasia: s.sasia,
          cmimi: s.cmimi,
          njesia: s.njesia,
          total: s.total,
          data: s.data,
          punetori: 'bitrix',
          punetoriUid: 'bitrix_import',
          klienti: s.klienti,
          shen: s.shen,
        });
        imported++;
      } catch(e) {
        errors++;
        log('Gabim: ' + s.produkti + ' - ' + e.message, 'err');
      }
    }));

    setProgress(i + BATCH, total);
    if ((i + BATCH) % 50 === 0 || i + BATCH >= total) {
      setStatus('Duke importuar... ' + Math.min(i+BATCH, total) + '/' + total);
      log('OK: ' + Math.min(i+BATCH, total) + '/' + total + ' shitje');
    }
    await new Promise(r => setTimeout(r, 80));
  }

  running = false;
  document.getElementById('btn-stop').style.display = 'none';
  setProgress(total, total);
  setStatus('Perfundoi! ' + imported + ' importuar, ' + errors + ' gabime.');
  log('PERFUNDOI: ' + imported + ' shitje u importuan me sukses!', 'ok');
  if (errors > 0) log(errors + ' shitje me gabim.', 'err');
}
</script>
