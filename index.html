<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOHA Accessories</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, updateDoc, serverTimestamp, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyARmBXSgjkjm9tVZDZL2hV52DtoikbZMKs",
    authDomain: "doha-shitje.firebaseapp.com",
    projectId: "doha-shitje",
    storageBucket: "doha-shitje.firebasestorage.app",
    messagingSenderId: "228963407770",
    appId: "1:228963407770:web:77ef18bee8e9a22ec20c23"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const googleProvider = new GoogleAuthProvider();

  let currentUser = null;
  let isAdmin = false;
  let shitjet = [];
  let produktet = [];
  let punetoret = [];
  let currentView = 'dashboard';
  let editingProdId = null;
  let unsubShitjet = null;

  // =====================================================
  // AUTENTIKIMI
  // =====================================================
  window.hyrSiAdmin = async () => {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      const adminRef = doc(db, 'config', 'admin');
      const adminSnap = await getDoc(adminRef);
      if (!adminSnap.exists()) {
        await setDoc(adminRef, { uid: result.user.uid, email: result.user.email });
      }
    } catch(e) { tregogabim("Gabim gjatë hyrjes: " + e.message); }
  };

  window.hyrSiPunetor = async () => {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value.trim();
    if (!username || !password) return tregogabim("Plotëso të gjitha fushat!");
    try {
      const email = username.toLowerCase() + '@doha-shitje.app';
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      tregogabim("Username ose fjalëkalimi i gabuar!");
    }
  };

  window.daleMe = async () => {
    if (unsubShitjet) unsubShitjet();
    await signOut(auth);
  };

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      const adminSnap = await getDoc(doc(db, 'config', 'admin'));
      isAdmin = adminSnap.exists() && adminSnap.data().uid === user.uid;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'flex';
      const displayName = isAdmin ? (user.displayName?.split(' ')[0] || 'Admin') : user.email?.split('@')[0] || 'Punëtor';
      document.getElementById('user-name').textContent = displayName;
      document.getElementById('user-avatar-text').textContent = displayName[0].toUpperCase();
      document.getElementById('role-badge').textContent = isAdmin ? '👑 Admin' : '👤 Punëtor';
      await ngarkoTeDhenat();
      filloBiserimin();
      document.getElementById('nav-punetoret').style.display = isAdmin ? 'flex' : 'none';
      document.getElementById('nav-raporte').style.display = isAdmin ? 'flex' : 'none';
      shkoTe('dashboard');
    } else {
      if (unsubShitjet) { unsubShitjet(); unsubShitjet = null; }
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
    }
  });

  // =====================================================
  // FIRESTORE
  // =====================================================
  async function ngarkoTeDhenat() {
    try {
      const [snapP, snapPun] = await Promise.all([
        getDocs(query(collection(db, 'produktet'), orderBy('emri'))),
        isAdmin ? getDocs(collection(db, 'punetoret')) : Promise.resolve({ docs: [] })
      ]);
      produktet = snapP.docs.map(d => ({ id: d.id, ...d.data() }));
      punetoret = snapPun.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) { tregogabim("Gabim ngarkimit: " + e.message); }
  }

  function filloBiserimin() {
    if (unsubShitjet) unsubShitjet();
    const q = query(collection(db, 'shitjet'), orderBy('krijuar', 'desc'));
    unsubShitjet = onSnapshot(q, (snap) => {
      shitjet = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === 'dashboard') renderDashboard();
      if (currentView === 'shitjet') renderShitjet();
      if (currentView === 'raporte') renderRaporte();
    });
  }

  window.shtoShitje = async (data) => {
    try {
      const punetorEmri = isAdmin ? 'Admin' : (currentUser.email?.split('@')[0] || 'Punëtor');
      await addDoc(collection(db, 'shitjet'), { ...data, punetori: punetorEmri, punetoriUid: currentUser.uid, krijuar: serverTimestamp() });
      tregosuksese("Shitja u ruajt! ✓");
      shkoTe('shitjet');
    } catch(e) { tregogabim("Gabim: " + e.message); }
  };

  window.fshijShitje = async (id) => {
    if (!isAdmin) return tregogabim("Vetëm admini mund të fshijë!");
    if (!confirm("A jeni i sigurt?")) return;
    try { await deleteDoc(doc(db, 'shitjet', id)); tregosuksese("U fshi!"); }
    catch(e) { tregogabim("Gabim: " + e.message); }
  };

  window.shtoProd = async (data) => {
    if (!isAdmin) return;
    try {
      if (editingProdId) {
        await updateDoc(doc(db, 'produktet', editingProdId), data);
        const idx = produktet.findIndex(p => p.id === editingProdId);
        if (idx !== -1) produktet[idx] = { id: editingProdId, ...data };
        editingProdId = null;
        tregosuksese("U përditësua! ✓");
      } else {
        const ref = await addDoc(collection(db, 'produktet'), data);
        produktet.push({ id: ref.id, ...data });
        tregosuksese("U shtua! ✓");
      }
      renderProduktet();
    } catch(e) { tregogabim("Gabim: " + e.message); }
  };

  window.fshijProd = async (id) => {
    if (!isAdmin || !confirm("A jeni i sigurt?")) return;
    try {
      await deleteDoc(doc(db, 'produktet', id));
      produktet = produktet.filter(p => p.id !== id);
      tregosuksese("U fshi!"); renderProduktet();
    } catch(e) { tregogabim("Gabim: " + e.message); }
  };

  window.redaktoProd = (id) => {
    const p = produktet.find(x => x.id === id); if (!p) return;
    editingProdId = id;
    document.getElementById('prod-emri').value = p.emri;
    document.getElementById('prod-cmimi').value = p.cmimi;
    document.getElementById('prod-njesia').value = p.njesia || '';
    document.getElementById('prod-btn').textContent = '💾 Përditëso';
    document.getElementById('prod-cancel').style.display = 'inline-block';
  };

  window.anuloProd = () => {
    editingProdId = null;
    document.getElementById('prod-form').reset();
    document.getElementById('prod-btn').textContent = '+ Shto';
    document.getElementById('prod-cancel').style.display = 'none';
  };

  window.shtoPunetor = async () => {
    const emri = document.getElementById('pun-emri').value.trim();
    const username = document.getElementById('pun-user').value.trim().toLowerCase();
    const password = document.getElementById('pun-pass').value.trim();
    if (!emri || !username || !password) return tregogabim("Plotëso të gjitha fushat!");
    if (password.length < 6) return tregogabim("Fjalëkalimi min. 6 karaktere!");
    if (!/^[a-z0-9]+$/.test(username)) return tregogabim("Username: vetëm shkronja dhe numra!");
    try {
      const email = username + '@doha-shitje.app';
      const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=AIzaSyARmBXSgjkjm9tVZDZL2hV52DtoikbZMKs`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, displayName: emri, returnSecureToken: true })
      });
      const data = await res.json();
      if (data.error) {
        if (data.error.message === 'EMAIL_EXISTS') return tregogabim("Ky username ekziston tashmë!");
        return tregogabim("Gabim: " + data.error.message);
      }
      await setDoc(doc(db, 'punetoret', data.localId), { emri, username, email, uid: data.localId, krijuar: new Date().toISOString() });
      punetoret.push({ id: data.localId, emri, username, uid: data.localId });
      tregosuksese(`Punëtori "${emri}" u shtua! ✓`);
      document.getElementById('pun-form').reset();
      renderPunetoret();
    } catch(e) { tregogabim("Gabim: " + e.message); }
  };

  window.fshijPunetor = async (id) => {
    if (!confirm("A jeni i sigurt?")) return;
    try {
      await deleteDoc(doc(db, 'punetoret', id));
      punetoret = punetoret.filter(p => p.id !== id);
      tregosuksese("U fshi!"); renderPunetoret();
    } catch(e) { tregogabim("Gabim: " + e.message); }
  };

  // =====================================================
  // VIEWS
  // =====================================================
  window.shkoTe = (view) => {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelector(`[data-view="${view}"]`)?.classList.add('active');
    switch(view) {
      case 'dashboard': renderDashboard(); break;
      case 'shito': renderFormaShitjes(); break;
      case 'shitjet': renderShitjet(); break;
      case 'punetoret': renderPunetoret(); break;
      case 'raporte': renderRaporte(); break;
    }
  };

  function renderDashboard() {
    const sot = new Date();
    const sotStr = sot.toISOString().split('T')[0];
    const shitjetSot = shitjet.filter(s => s.data === sotStr);
    const totalSot = shitjetSot.reduce((a,s) => a+(s.total||0), 0);
    const muajiKy = sot.getMonth(), vitiKy = sot.getFullYear();
    const totalMuaj = shitjet.filter(s => { const d = new Date(s.data); return d.getMonth()===muajiKy && d.getFullYear()===vitiKy; }).reduce((a,s) => a+(s.total||0), 0);
    const chart7 = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const dStr = d.toISOString().split('T')[0];
      chart7.push({ label: d.toLocaleDateString('sq', {weekday:'short'}), total: shitjet.filter(s=>s.data===dStr).reduce((a,s)=>a+(s.total||0),0) });
    }
    const maxVal = Math.max(...chart7.map(d=>d.total), 1);
    document.getElementById('content').innerHTML = `
      <div class="page-header">
        <div><h1 class="page-title">Mirë se vini, <em>${isAdmin?'Admin':currentUser.email?.split('@')[0]}</em></h1>
        <p class="page-sub">${sot.toLocaleDateString('sq',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card accent"><div class="stat-icon">💰</div><div class="stat-info"><span class="stat-val">${formatMoney(totalSot)}</span><span class="stat-label">Shitjet Sot</span></div></div>
        <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-info"><span class="stat-val">${formatMoney(totalMuaj)}</span><span class="stat-label">Këtë Muaj</span></div></div>
        <div class="stat-card"><div class="stat-icon">🧾</div><div class="stat-info"><span class="stat-val">${shitjetSot.length}</span><span class="stat-label">Fatura Sot</span></div></div>
      </div>
      <div class="chart-section">
        <div class="section-title">7 Ditët e Fundit</div>
        <div class="bar-chart">
          ${chart7.map(d=>`<div class="bar-col"><div class="bar-wrap"><div class="bar-fill" style="height:${(d.total/maxVal*100)}%">${d.total>0?`<span class="bar-tooltip">${formatMoney(d.total)}</span>`:''}</div></div><span class="bar-label">${d.label}</span></div>`).join('')}
        </div>
      </div>
      <div class="recent-section">
        <div class="section-header"><div class="section-title">Shitjet e Fundit</div><button class="link-btn" onclick="shkoTe('shitjet')">Shiko të gjitha →</button></div>
        ${shitjet.slice(0,5).map(s=>`<div class="shitje-row">${s.fotoUrl?`<img src="${s.fotoUrl}" class="shitje-foto">`:''}<div class="shitje-info"><strong>${s.produkti}</strong><span>${s.data} • ${s.sasia} ${s.njesia||'cop'} • <span class="punetor-tag">👤 ${s.punetori||'—'}</span></span></div><div class="shitje-total">${formatMoney(s.total)}</div></div>`).join('')||'<div class="empty-state">Nuk ka shitje ende.</div>'}
      </div>`;
  }

  function renderFormaShitjes() {
    const sot = new Date().toISOString().split('T')[0];
    document.getElementById('content').innerHTML = `
      <div class="page-header"><h1 class="page-title">Shitje e Re</h1></div>
      <div class="form-card">
        <div class="form-group"><label>Emri i Produktit / Shërbimit</label>
          <input type="text" id="s-produkti" placeholder="p.sh. Kafe, Bukë, Qumësht..." autocomplete="off">
        </div>
        <div class="form-row">
          <div class="form-group"><label>Sasia</label><input type="number" id="s-sasia" min="0.01" step="0.01" value="1" oninput="llogaritTotal()"></div>
          <div class="form-group"><label>Çmimi (€)</label><input type="number" id="s-cmimi" min="0" step="0.01" placeholder="0.00" oninput="llogaritTotal()"></div>
          <div class="form-group"><label>Njësia</label><input type="text" id="s-njesia" placeholder="cop, kg, l..."></div>
        </div>
        <div class="form-group"><label>Data</label><input type="date" id="s-data" value="${sot}"></div>
        <div class="form-group"><label>Shënim (opsional)</label><input type="text" id="s-shen" placeholder="p.sh. Klienti: Agimi..."></div>
        <div class="form-group">
          <label>Foto (opsionale)</label>
          <div class="foto-upload-zone" onclick="document.getElementById('s-foto').click()">
            <input type="file" id="s-foto" accept="image/*" capture="environment" style="display:none" onchange="shfaqPreview(this)">
            <div id="foto-preview-wrap">
              <span class="foto-icon">📷</span>
              <span class="foto-hint">Kliko për të ngarkuar foto ose bëj foto me kamerë</span>
            </div>
          </div>
        </div>
        <div class="total-preview"><span>Totali:</span><strong id="total-preview">€ 0.00</strong></div>
        <button class="btn-primary" id="btn-ruaj" onclick="ruajShitjen()">💾 Ruaj Shitjen</button>
      </div>`;
  }

  window.shfaqPreview = (input) => {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('foto-preview-wrap').innerHTML = `
        <img src="${e.target.result}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;">
        <button type="button" onclick="hiqFoton(event)" style="margin-top:8px;background:none;border:1px solid var(--error);color:var(--error);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;">✕ Hiq foton</button>
      `;
    };
    reader.readAsDataURL(file);
  };

  window.hiqFoton = (e) => {
    e.stopPropagation();
    document.getElementById('s-foto').value = '';
    document.getElementById('foto-preview-wrap').innerHTML = `
      <span class="foto-icon">📷</span>
      <span class="foto-hint">Kliko për të ngarkuar foto ose bëj foto me kamerë</span>
    `;
  };

  window.llogaritTotal = () => {
    const s = parseFloat(document.getElementById('s-sasia')?.value)||0;
    const c = parseFloat(document.getElementById('s-cmimi')?.value)||0;
    const el = document.getElementById('total-preview');
    if (el) el.textContent = formatMoney(s*c);
  };

  window.ruajShitjen = async () => {
    const produkti = document.getElementById('s-produkti').value.trim();
    const sasia = parseFloat(document.getElementById('s-sasia').value);
    const cmimi = parseFloat(document.getElementById('s-cmimi').value);
    const njesia = document.getElementById('s-njesia').value.trim() || 'cop';
    const data = document.getElementById('s-data').value;
    const shen = document.getElementById('s-shen').value;
    if (!produkti) return tregogabim("Shkruaj emrin e produktit!");
    if (!sasia||sasia<=0) return tregogabim("Sasia duhet > 0!");
    if (!cmimi||cmimi<=0) return tregogabim("Çmimi duhet > 0!");

    const btn = document.getElementById('btn-ruaj');
    btn.textContent = '⏳ Duke ruajtur...';
    btn.disabled = true;

    let fotoUrl = '';
    const fotoInput = document.getElementById('s-foto');
    if (fotoInput.files && fotoInput.files[0]) {
      try {
        const file = fotoInput.files[0];
        const ext = file.name.split('.').pop();
        const fotoRef = ref(storage, `foto/${currentUser.uid}_${Date.now()}.${ext}`);
        await uploadBytes(fotoRef, file);
        fotoUrl = await getDownloadURL(fotoRef);
      } catch(e) {
        tregogabim("Gabim ngarkimit të fotos: " + e.message);
        btn.textContent = '💾 Ruaj Shitjen';
        btn.disabled = false;
        return;
      }
    }
    await shtoShitje({ produkti, sasia, cmimi, njesia, data, shen, total: sasia*cmimi, fotoUrl });
    btn.textContent = '💾 Ruaj Shitjen';
    btn.disabled = false;
  };

  function renderShitjet() {
    const grouped = {};
    shitjet.forEach(s => { if (!grouped[s.data]) grouped[s.data]=[]; grouped[s.data].push(s); });
    const rows = Object.entries(grouped).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30);
    document.getElementById('content').innerHTML = `
      <div class="page-header"><h1 class="page-title">Të gjitha Shitjet</h1><button class="btn-primary small" onclick="shkoTe('shito')">+ Shitje e Re</button></div>
      ${!rows.length?'<div class="empty-state">Nuk ka shitje ende.</div>':''}
      ${rows.map(([data,items])=>{
        const dayTotal = items.reduce((a,s)=>a+(s.total||0),0);
        return `<div class="day-group"><div class="day-header"><span>${formatDate(data)}</span><span class="day-total">${formatMoney(dayTotal)}</span></div>
          ${items.map(s=>`<div class="shitje-row"><div class="shitje-info"><strong>${s.produkti}</strong><span>${s.sasia} ${s.njesia||'cop'} × ${formatMoney(s.cmimi)} • <span class="punetor-tag">👤 ${s.punetori||'—'}</span>${s.shen?' • '+s.shen:''}</span></div>
          <div style="display:flex;align-items:center;gap:10px"><div class="shitje-total">${formatMoney(s.total)}</div>${isAdmin?`<button class="del-btn" onclick="fshijShitje('${s.id}')">✕</button>`:''}</div></div>`).join('')}
        </div>`;
      }).join('')}`;
  }

  function renderProduktet() {
    document.getElementById('content').innerHTML = `
      <div class="page-header"><h1 class="page-title">Produktet</h1></div>
      ${isAdmin?`<div class="form-card"><h3 style="margin-bottom:14px;font-size:15px;font-weight:600">Shto / Ndrysho Produkt</h3>
        <form id="prod-form" onsubmit="event.preventDefault();ruajProd()">
          <div class="form-row">
            <div class="form-group"><label>Emri</label><input type="text" id="prod-emri" placeholder="p.sh. Bukë" required></div>
            <div class="form-group"><label>Çmimi (€)</label><input type="number" id="prod-cmimi" min="0" step="0.01" placeholder="0.00" required></div>
            <div class="form-group"><label>Njësia</label><input type="text" id="prod-njesia" placeholder="cop, kg, l..."></div>
          </div>
          <div style="display:flex;gap:8px">
            <button type="submit" id="prod-btn" class="btn-primary">+ Shto</button>
            <button type="button" id="prod-cancel" class="btn-secondary" style="display:none" onclick="anuloProd()">Anulo</button>
          </div>
        </form></div>`:'<div class="info-box">📦 Lista e produkteve (vetëm admini mund të ndryshojë)</div>'}
      <div class="prod-grid">
        ${!produktet.length?'<div class="empty-state">Nuk ka produkte.</div>':''}
        ${produktet.map(p=>`<div class="prod-card"><div class="prod-name">${p.emri}</div><div class="prod-price">${formatMoney(p.cmimi)}<span>/${p.njesia||'cop'}</span></div>
          ${isAdmin?`<div class="prod-actions"><button onclick="redaktoProd('${p.id}')">✏️</button><button onclick="fshijProd('${p.id}')">🗑️</button></div>`:''}</div>`).join('')}
      </div>`;
  }

  window.ruajProd = async () => {
    const emri = document.getElementById('prod-emri').value.trim();
    const cmimi = parseFloat(document.getElementById('prod-cmimi').value);
    const njesia = document.getElementById('prod-njesia').value.trim()||'cop';
    if (!emri) return tregogabim("Shkruaj emrin!");
    if (!cmimi||cmimi<=0) return tregogabim("Çmimi duhet > 0!");
    await shtoProd({ emri, cmimi, njesia });
    document.getElementById('prod-form')?.reset();
    document.getElementById('prod-btn').textContent = '+ Shto';
    document.getElementById('prod-cancel').style.display = 'none';
  };

  function renderPunetoret() {
    if (!isAdmin) return;
    document.getElementById('content').innerHTML = `
      <div class="page-header"><h1 class="page-title">Punëtorët</h1></div>
      <div class="form-card"><h3 style="margin-bottom:14px;font-size:15px;font-weight:600">Shto Punëtor të Ri</h3>
        <form id="pun-form" onsubmit="event.preventDefault();shtoPunetor()">
          <div class="form-row">
            <div class="form-group"><label>Emri i Plotë</label><input type="text" id="pun-emri" placeholder="p.sh. Agim Berisha" required></div>
            <div class="form-group"><label>Username</label><input type="text" id="pun-user" placeholder="p.sh. agim" required></div>
            <div class="form-group"><label>Fjalëkalimi</label><input type="password" id="pun-pass" placeholder="min. 6 karaktere" required></div>
          </div>
          <button type="submit" class="btn-primary">+ Shto Punëtorin</button>
        </form>
      </div>
      <div class="pun-list">
        <div class="section-title" style="margin-bottom:12px">Punëtorët Aktiv (${punetoret.length})</div>
        ${!punetoret.length?'<div class="empty-state">Nuk ka punëtorë ende. Shto punëtorin e parë!</div>':''}
        ${punetoret.map(p=>`<div class="pun-row">
          <div class="pun-avatar">${p.emri[0].toUpperCase()}</div>
          <div class="pun-info"><strong>${p.emri}</strong><span>@${p.username}</span></div>
          <div class="pun-stats">${shitjet.filter(s=>s.punetoriUid===p.uid).length} shitje</div>
          <button class="del-btn" onclick="fshijPunetor('${p.id}')">✕</button>
        </div>`).join('')}
      </div>`;
  }

  function renderRaporte() {
    if (!isAdmin) return;
    const sot = new Date();
    const muajiKy = sot.getMonth(), vitiKy = sot.getFullYear();
    const muajet=['Janar','Shkurt','Mars','Prill','Maj','Qershor','Korrik','Gusht','Shtator','Tetor','Nëntor','Dhjetor'];
    const muajiKaluar = muajiKy===0?11:muajiKy-1, vitiKaluar = muajiKy===0?vitiKy-1:vitiKy;
    const shitjetMuaj = shitjet.filter(s=>{const d=new Date(s.data);return d.getMonth()===muajiKy&&d.getFullYear()===vitiKy;});
    const shitjetMuajK = shitjet.filter(s=>{const d=new Date(s.data);return d.getMonth()===muajiKaluar&&d.getFullYear()===vitiKaluar;});
    const totalMuaj=shitjetMuaj.reduce((a,s)=>a+(s.total||0),0);
    const totalMuajK=shitjetMuajK.reduce((a,s)=>a+(s.total||0),0);
    const totalGjith=shitjet.reduce((a,s)=>a+(s.total||0),0);
    const byProd={};
    shitjet.forEach(s=>{if(!byProd[s.produkti])byProd[s.produkti]={total:0,count:0};byProd[s.produkti].total+=s.total||0;byProd[s.produkti].count++;});
    const topProd=Object.entries(byProd).sort((a,b)=>b[1].total-a[1].total).slice(0,5);
    const byPun={};
    shitjet.forEach(s=>{const k=s.punetori||'—';if(!byPun[k])byPun[k]={total:0,count:0};byPun[k].total+=s.total||0;byPun[k].count++;});
    const topPun=Object.entries(byPun).sort((a,b)=>b[1].total-a[1].total);
    document.getElementById('content').innerHTML = `
      <div class="page-header"><h1 class="page-title">Raporte</h1></div>
      <div class="stats-grid">
        <div class="stat-card accent"><div class="stat-icon">📊</div><div class="stat-info"><span class="stat-val">${formatMoney(totalMuaj)}</span><span class="stat-label">${muajet[muajiKy]} ${vitiKy}</span></div></div>
        <div class="stat-card"><div class="stat-icon">📉</div><div class="stat-info"><span class="stat-val">${formatMoney(totalMuajK)}</span><span class="stat-label">Muaji i Kaluar</span></div></div>
        <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-info"><span class="stat-val">${formatMoney(totalGjith)}</span><span class="stat-label">Total Gjithsej</span></div></div>
        <div class="stat-card"><div class="stat-icon">🧾</div><div class="stat-info"><span class="stat-val">${shitjet.length}</span><span class="stat-label">Fatura Gjithsej</span></div></div>
      </div>
      <div class="raporte-grid">
        <div class="chart-section"><div class="section-title">Top Produktet</div>
          ${topProd.map(([emri,d],i)=>`<div class="top-row"><span class="rank">#${i+1}</span><div class="top-info"><strong>${emri}</strong><span>${d.count} shitje</span></div><div class="top-total">${formatMoney(d.total)}</div><div class="progress-bar"><div class="progress-fill" style="width:${topProd[0][1].total>0?(d.total/topProd[0][1].total*100):0}%"></div></div></div>`).join('')||'<div class="empty-state">Nuk ka të dhëna.</div>'}
        </div>
        <div class="chart-section"><div class="section-title">Shitjet sipas Punëtorit</div>
          ${topPun.map(([emri,d])=>`<div class="top-row"><div class="pun-avatar small">${emri[0]?.toUpperCase()||'?'}</div><div class="top-info"><strong>${emri}</strong><span>${d.count} shitje</span></div><div class="top-total">${formatMoney(d.total)}</div><div class="progress-bar"><div class="progress-fill" style="width:${topPun[0][1].total>0?(d.total/topPun[0][1].total*100):0}%"></div></div></div>`).join('')||'<div class="empty-state">Nuk ka të dhëna.</div>'}
        </div>
      </div>`;
  }

  window.shfaqFotoTe = (url) => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;';
    overlay.innerHTML = `<img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain;">`;
    overlay.onclick = () => document.body.removeChild(overlay);
    document.body.appendChild(overlay);
  };

  function formatMoney(v){return '€ '+(v||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
  function formatDate(str){const d=new Date(str+'T12:00:00');return d.toLocaleDateString('sq',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
  function tregosuksese(msg){showToast(msg,'success');}
  function tregogabim(msg){showToast(msg,'error');}
  function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',3500);}
  window.switchTab=(tab)=>{
    document.getElementById('tab-admin').classList.toggle('active',tab==='admin');
    document.getElementById('tab-punetor').classList.toggle('active',tab==='punetor');
    document.getElementById('login-admin').style.display=tab==='admin'?'block':'none';
    document.getElementById('login-punetor').style.display=tab==='punetor'?'block':'none';
  };
</script>

<style>
  :root{--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--border:#2a2a38;--accent:#f0b429;--accent2:#e8832a;--text:#e8e8f0;--text2:#8888aa;--success:#3ecf8e;--error:#f87171;--radius:14px;}

  .tab-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3);}
  .btn-google{width:100%;padding:13px 20px;background:white;color:#111;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform 0.15s;font-family:'DM Sans',sans-serif;}
  .btn-google:hover{transform:translateY(-1px);}
  .login-note{margin-top:14px;font-size:12px;color:var(--text2);text-align:center;}
  #app-screen{display:none;min-height:100vh;}
  .sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:fixed;left:0;top:0;bottom:0;z-index:100;}
  .logo{font-family:'DM Serif Display',serif;font-size:26px;color:var(--accent);padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px;}

  .nav-item{display:flex;align-items:center;gap:11px;padding:11px 20px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;border-left:3px solid transparent;transition:all 0.2s;user-select:none;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:var(--bg3);color:var(--accent);border-left-color:var(--accent);}
  .nav-icon{font-size:17px;}
  .sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);}
  .user-info{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .user-avatar-circle{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#111;flex-shrink:0;}
  .user-details{flex:1;overflow:hidden;}
  #user-name{font-size:13px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #role-badge{font-size:11px;color:var(--text2);}
  .logout-btn{width:100%;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
  .logout-btn:hover{border-color:var(--error);color:var(--error);}
  .main{margin-left:230px;flex:1;padding:28px 32px;min-height:100vh;}
  .page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;}
  .page-title{font-family:'DM Serif Display',serif;font-size:34px;letter-spacing:-1px;line-height:1.1;}
  .page-title em{color:var(--accent);font-style:italic;}
  .page-sub{color:var(--text2);font-size:13px;margin-top:4px;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;align-items:center;gap:14px;transition:border-color 0.2s;}
  .stat-card:hover{border-color:var(--accent);}
  .stat-card.accent{border-color:rgba(240,180,41,0.3);background:linear-gradient(135deg,rgba(240,180,41,0.07),var(--bg2));}
  .stat-icon{font-size:26px;}
  .stat-info{display:flex;flex-direction:column;}
  .stat-val{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
  .stat-label{font-size:11px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
  .chart-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;}
  .section-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;}
  .bar-chart{display:flex;align-items:flex-end;gap:6px;height:110px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;}
  .bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;}
  .bar-fill{width:100%;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:5px 5px 0 0;min-height:3px;position:relative;transition:height 0.5s ease;}
  .bar-tooltip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:10px;white-space:nowrap;display:none;z-index:10;margin-bottom:3px;}
  .bar-fill:hover .bar-tooltip{display:block;}
  .bar-label{font-size:10px;color:var(--text2);}
  .recent-section,.day-group{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  .section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
  .link-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;}
  .day-header{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:var(--bg3);font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);}
  .day-total{font-weight:700;color:var(--accent);font-size:14px;}
  .shitje-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);transition:background 0.15s;}
  .shitje-row:last-child{border-bottom:none;}
  .shitje-row:hover{background:var(--bg3);}
  .shitje-info{display:flex;flex-direction:column;}
  .shitje-info strong{font-size:14px;font-weight:500;}
  .shitje-info span{font-size:12px;color:var(--text2);margin-top:2px;}
  .shitje-total{font-weight:700;font-size:15px;color:var(--success);}
  .punetor-tag{color:var(--accent2);font-weight:500;}
  .form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;}
  .form-group{display:flex;flex-direction:column;gap:6px;flex:1;margin-bottom:14px;}
  .form-row{display:flex;gap:14px;}
  .form-group label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
  .form-group input,.form-group select{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;outline:none;}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent);}
  .form-group select option{background:var(--bg3);}
  .hint{font-size:12px;color:var(--accent2);}
  .total-preview{display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:14px;font-size:14px;}

  .foto-upload-zone{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:border-color 0.2s;background:var(--bg3);}

  .shitje-foto{width:52px;height:52px;object-fit:cover;border-radius:8px;cursor:pointer;flex-shrink:0;border:1px solid var(--border);transition:transform 0.15s;}
  .shitje-foto:hover{transform:scale(1.05);}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 18px;font-size:14px;font-weight:500;transform:translateY(80px);opacity:0;transition:all 0.3s;z-index:9999;max-width:300px;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.success{border-color:var(--success);color:var(--success);}
  .toast.error{border-color:var(--error);color:var(--error);}
  @media(max-width:768px){
    .sidebar{width:100%;height:60px;flex-direction:row;bottom:0;top:auto;right:0;padding:0;border-right:none;border-top:1px solid var(--border);}
    .logo,.sidebar-footer,.nav-item span:last-child{display:none;}
    .nav-item{flex-direction:column;padding:6px;flex:1;justify-content:center;gap:3px;font-size:9px;border-left:none;border-top:3px solid transparent;}
    .nav-item.active{border-left:none;border-top-color:var(--accent);}
    .main{margin-left:0;margin-bottom:60px;padding:16px;}
    .form-row{flex-direction:column;}
    .stats-grid{grid-template-columns:1fr 1fr;}
    .raporte-grid{grid-template-columns:1fr;}
  }
</style>
</head>
