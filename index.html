<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<!-- v20260311-0706 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOHA Accessories</title>
<!-- v3.1 -->
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f11;--bg2:#17171a;--bg3:#1e1e22;--border:#2a2a30;--text:#f0f0f2;--text2:#8b8b9a;--accent:#f0b429;--accent2:#fb923c;--success:#4ade80;--error:#f87171;--radius:14px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  /* LOGIN */
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .login-logo{font-family:'DM Serif Display',serif;font-size:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .login-tagline{font-size:13px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
  .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:360px;}
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tab-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all 0.2s;}
  .tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;border-color:transparent;font-weight:700;}
  .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all 0.2s;margin-bottom:12px;}
  .btn-google:hover{border-color:var(--accent);}
  .login-note{font-size:12px;color:var(--text2);text-align:center;margin-top:8px;}
  /* APP */
  #app-screen{display:none;min-height:100vh;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
  .logo{font-family:'DM Serif Display',serif;font-size:24px;padding:24px 20px 16px;color:var(--accent);border-bottom:1px solid var(--border);}
  .logo small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  .nav-items-wrap{flex:1;overflow-y:auto;padding:8px 0;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;font-size:14px;color:var(--text2);transition:all 0.15s;border-left:3px solid transparent;}
  .nav-item:hover{color:var(--text);background:var(--bg3);}
  .nav-item.active{color:var(--text);background:var(--bg3);border-left-color:var(--accent);}
  .nav-icon{font-size:18px;width:22px;text-align:center;}
  .sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
  .user-info{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .user-avatar-circle{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#111;flex-shrink:0;}
  .user-details{display:flex;flex-direction:column;}
  .user-details span:first-child{font-size:13px;font-weight:600;}
  .user-details span:last-child{font-size:11px;color:var(--text2);}
  .logout-btn{width:100%;background:none;border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s;}
  .logout-btn:hover{border-color:var(--error);color:var(--error);}
  .main{margin-left:220px;padding:28px;min-height:100vh;}
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;}
  .page-title{font-family:'DM Serif Display',serif;font-size:32px;}
  .page-sub{font-size:13px;color:var(--text2);margin-top:4px;}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;align-items:center;gap:14px;transition:border-color 0.2s;}
  .stat-card.accent{border-color:rgba(240,180,41,0.3);background:linear-gradient(135deg,rgba(240,180,41,0.07),var(--bg2));}
  .stat-card.gold{border-color:rgba(240,180,41,0.5);background:linear-gradient(135deg,rgba(240,180,41,0.12),var(--bg2));}
  .stat-icon{font-size:26px;}
  .stat-info{display:flex;flex-direction:column;}
  .stat-val{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
  .stat-label{font-size:11px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
  .chart-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;}
  .section-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;}
  .bar-chart{display:flex;align-items:flex-end;gap:6px;height:110px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;}
  .bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;}
  .bar-fill{width:100%;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:5px 5px 0 0;min-height:3px;position:relative;}
  .bar-label{font-size:10px;color:var(--text2);}
  .recent-section,.day-group{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  .section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
  .link-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;}
  .day-header{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:var(--bg3);font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);}
  .day-total{font-weight:700;color:var(--accent);font-size:14px;}
  .shitje-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);transition:background 0.15s;gap:10px;}
  .shitje-row:last-child{border-bottom:none;}
  .shitje-row:hover{background:var(--bg3);}
  .shitje-info{display:flex;flex-direction:column;flex:1;}
  .shitje-info strong{font-size:14px;font-weight:500;}
  .shitje-info span{font-size:12px;color:var(--text2);margin-top:2px;}
  .shitje-total{font-weight:700;font-size:15px;color:var(--success);white-space:nowrap;}
  .punetor-tag{color:var(--accent2);font-weight:500;}
  .shitje-foto{width:52px;height:52px;object-fit:cover;border-radius:8px;cursor:pointer;flex-shrink:0;border:1px solid var(--border);}
  .form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;}
  .form-group{display:flex;flex-direction:column;gap:6px;flex:1;margin-bottom:14px;}
  .form-row{display:flex;gap:14px;}
  .form-group label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
  .form-group input,.form-group select,.form-group textarea{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;outline:none;width:100%;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
  .total-preview{display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:14px;font-size:14px;}
  .total-preview strong{font-size:20px;color:var(--success);}
  .info-box{background:rgba(240,180,41,0.08);border:1px solid rgba(240,180,41,0.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--accent);margin-bottom:16px;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:transform 0.15s,box-shadow 0.15s;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,180,41,0.3);}
  .btn-primary.small{padding:9px 16px;font-size:13px;}
  .btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .btn-secondary.small{padding:9px 16px;font-size:13px;}
  .del-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:11px;transition:all 0.15s;flex-shrink:0;}
  .del-btn:hover{background:rgba(248,113,113,0.1);border-color:var(--error);color:var(--error);}
  .edit-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:12px;transition:all 0.15s;flex-shrink:0;}
  .edit-btn:hover{background:rgba(99,179,237,0.1);border-color:var(--accent);color:var(--accent);}
  .pun-list{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .pun-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border);transition:background 0.15s;}
  .pun-row:last-child{border-bottom:none;}
  .pun-row:hover{background:var(--bg3);}
  .pun-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#111;flex-shrink:0;}
  .pun-avatar.small{width:30px;height:30px;font-size:12px;}
  .pun-info{flex:1;}
  .pun-info strong{display:block;font-size:14px;font-weight:600;}
  .pun-info span{font-size:12px;color:var(--text2);}
  .pun-stats{font-size:12px;color:var(--text2);min-width:80px;text-align:right;}
  .top-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);position:relative;}
  .top-row:last-child{border-bottom:none;}
  .rank{font-size:16px;font-weight:700;color:var(--text2);min-width:28px;}
  .top-info{flex:1;}
  .top-info strong{display:block;font-size:14px;}
  .top-info span{font-size:11px;color:var(--text2);}
  .top-total{font-weight:700;font-size:14px;color:var(--success);min-width:80px;text-align:right;}
  .progress-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border);border-radius:2px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;}
  .empty-state{padding:28px;text-align:center;color:var(--text2);font-size:14px;}
  .raporte-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .rtab{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 16px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all 0.2s;}
  .rtab:hover{border-color:var(--accent);color:var(--text);}
  .rtab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;border-color:transparent;font-weight:700;}
  .galeria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
  .galeria-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s;}
  .galeria-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .galeria-card img{width:100%;height:180px;object-fit:cover;display:block;}
  .galeria-info{padding:12px;}
  .galeria-info strong{display:block;font-size:14px;font-weight:600;margin-bottom:4px;}
  .galeria-info span{display:block;font-size:11px;color:var(--text2);margin-top:2px;}
  .foto-upload-zone{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;background:var(--bg3);}
  .btn-foto{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all 0.2s;}
  .btn-foto:hover{border-color:var(--accent);color:var(--accent);}
  .foto-icon{font-size:32px;display:block;margin-bottom:8px;}
  .foto-hint{font-size:13px;color:var(--text2);}
  .klient-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
  .klient-row:hover{background:var(--bg3);}
  .klient-row:last-child{border-bottom:none;}
  .arka-banner{background:linear-gradient(135deg,rgba(240,180,41,0.1),rgba(251,146,60,0.08));border:1px solid rgba(240,180,41,0.3);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;}
  .arka-admin-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
  .btn-barazo{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
  .btn-danger{background:none;border:2px solid var(--error);color:var(--error);border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:all 0.2s;}
  .btn-danger:hover{background:var(--error);color:#fff;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:400px;width:100%;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 18px;font-size:14px;font-weight:500;transform:translateY(80px);opacity:0;transition:all 0.3s;z-index:10000;max-width:300px;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.success{border-color:var(--success);color:var(--success);}
  .toast.error{border-color:var(--error);color:var(--error);}
  @media(max-width:768px){
    .sidebar{width:100%;height:56px;flex-direction:row;top:0;bottom:auto;left:0;right:0;padding:0 16px;border-right:none;border-bottom:1px solid var(--border);align-items:center;justify-content:space-between;}
    .logo{display:flex;padding:0;border:none;margin:0;font-size:22px;align-items:center;}
    .logo small{display:none;}
    .sidebar-footer{display:none;}
    .nav-items-wrap{position:fixed;top:56px;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);flex-direction:column;padding:8px 0;display:none;z-index:200;overflow-y:auto;max-height:calc(100vh - 56px);}
    .nav-items-wrap.open{display:flex;}
    .nav-item{border-left:none;border-top:none;padding:14px 20px;font-size:15px;width:100%;}
    .nav-item.active{border-left:3px solid var(--accent);border-top:none;}
    .hamburger{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px 8px;display:flex;align-items:center;}
    .mobile-dil{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .mobile-dil:hover{border-color:var(--error);color:var(--error);}
    .mobile-user{display:flex;align-items:center;gap:8px;}
    .main{margin-left:0;margin-top:56px;padding:16px;}
    .form-row{flex-direction:column;}
    .stats-grid{grid-template-columns:1fr 1fr;}
    .toast{bottom:16px;right:16px;left:16px;max-width:100%;}
  }
  @media(min-width:769px){
    .hamburger{display:none;}
    .mobile-dil{display:none;}
    .mobile-user{display:none;}
  }
</style>
</head>
<body>

<div id="login-screen" style="display:flex">
  <div class="login-logo">DOHA</div>
  <div class="login-tagline">Accessories</div>
  <div class="login-card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-admin" onclick="switchTab('admin')">Admin</button>
      <button class="tab-btn" id="tab-punetor" onclick="switchTab('punetor')">Punetor</button>
    </div>
    <div id="login-admin">
      <button class="btn-google" onclick="hyrSiAdmin()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Hyr si Admin me Google
      </button>
      <p class="login-note">Vetem 3 llogarite kane akses si admin</p>
    </div>
    <div id="login-punetor" style="display:none">
      <div class="form-group"><label>Username</label><input type="text" id="login-user" placeholder="username..." autocomplete="username"></div>
      <div class="form-group"><label>Fjalekalimi</label><input type="password" id="login-pass" placeholder="..." autocomplete="current-password" onkeydown="if(event.key==='Enter')hyrSiPunetor()"></div>
      <button class="btn-primary" style="width:100%" onclick="hyrSiPunetor()">Hyr si Punetor</button>
    </div>
  </div>
</div>

<div id="app-screen" style="display:none">
  <nav class="sidebar">
    <div class="logo">DOHA<small>Accessories</small></div>
    <div class="mobile-user">
      <div class="user-avatar-circle" id="mob-avatar" style="width:28px;height:28px;font-size:12px;">A</div>
      <span id="mob-role" style="font-size:11px;color:var(--text2);">-</span>
    </div>
    <button class="mobile-dil" onclick="daleMe()">Dil</button>
    <button class="hamburger" onclick="toggleMenu()" id="hamburger-btn">&#9776;</button>
    <div class="nav-items-wrap" id="nav-wrap">
      <div class="nav-item active" data-view="dashboard" onclick="navTo('dashboard')"><span class="nav-icon">&#127968;</span><span>Ballina</span></div>
      <div class="nav-item" data-view="shito" onclick="navTo('shito')"><span class="nav-icon">&#43;</span><span>Shitje e Re</span></div>
      <div class="nav-item" data-view="shitjet" onclick="navTo('shitjet')"><span class="nav-icon">&#128222;</span><span>Shitjet</span></div>
      <div class="nav-item" id="nav-posta" data-view="posta" onclick="navTo('posta')"><span class="nav-icon">&#128230;</span><span>Posta</span></div>
      <div class="nav-item" data-view="shpenzime" onclick="navTo('shpenzime')"><span class="nav-icon">&#128178;</span><span>Shpenzime</span></div>
      <div class="nav-item" id="nav-klientet" data-view="klientet" onclick="navTo('klientet')" style="display:none"><span class="nav-icon">&#128101;</span><span>Klientet</span></div>
      <div class="nav-item" id="nav-punetoret" data-view="punetoret" onclick="navTo('punetoret')" style="display:none"><span class="nav-icon">&#128101;</span><span>Punetoret</span></div>
      <div class="nav-item" id="nav-raporte" data-view="raporte" onclick="navTo('raporte')" style="display:none"><span class="nav-icon">&#128202;</span><span>Raporte</span></div>
      <div class="nav-item" id="nav-galeria" data-view="galeria" onclick="navTo('galeria')" style="display:none"><span class="nav-icon">&#128247;</span><span>Galeria</span></div>
      <div class="nav-item" id="nav-backup" data-view="backup" onclick="navTo('backup')" style="display:none"><span class="nav-icon">&#128451;</span><span>Backup</span></div>
      <div class="nav-item" data-view="profili" onclick="navTo('profili')"><span class="nav-icon">&#9881;</span><span>Profili</span></div>
      <div class="sidebar-footer">

window.kerkoProduktin = function(val) {
  const box = document.getElementById('prod-suggestions');
  if (!box) return;
  const v = (val||'').trim().toLowerCase();
  // Build map: produkti -> {count, total, cmimi i fundit, njesia e fundit}
  const prodMap = {};
  shitjet.forEach(function(s) {
    if (!s.produkti) return;
    const k = (s.produkti||"").toLowerCase().trim();
    if (!prodMap[k]) prodMap[k] = {count:0, total:0, cmimi:0, njesia:'cop', data:'', emri:s.produkti||""};
    prodMap[k].count++;
    prodMap[k].total += (s.total||0);
    if (!prodMap[k].data || (s.data||'') > prodMap[k].data) {
      prodMap[k].data = s.data||'';
      prodMap[k].cmimi = s.cmimi||0;
      prodMap[k].njesia = s.njesia||'cop';
    }
  });
  // Filter and sort by count
  const results = Object.entries(prodMap)
    .filter(function(e) { return !v || e[0].toLowerCase().includes(v); })
    .sort(function(a,b) { return b[1].count - a[1].count; })

// Resize foto dhe ktheje si Base64
function resizeDheBase64(file, maxPx) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onerror = function() { reject(new Error('Leximi i fotos deshtoi')); };
    reader.onload = function(e) {
      const img = new Image();
      img.onerror = function() { reject(new Error('Foto e pavlefshme')); };
      img.onload = function() {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        // Quality 0.75 - balance mes madhesise dhe cilesise
        const b64 = canvas.toDataURL('image/jpeg', 0.75);
        resolve(b64);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderRaporte() {
  if (!isAdmin) return;
  const sot = new Date();
  const muajet = ['Janar','Shkurt','Mars','Prill','Maj','Qershor','Korrik','Gusht','Shtator','Tetor','Nentor','Dhjetor'];
  const totalGjith = shitjet.reduce(function(a,s) { return a+(s.total||0); }, 0);

  const byMuaj = {};
  shitjet.forEach(function(s) {
    if (!s.data) return;
    const d = new Date(s.data+'T12:00:00');
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    if (!byMuaj[key]) byMuaj[key] = {total:0, count:0, muaji:d.getMonth(), viti:d.getFullYear()};
    byMuaj[key].total += s.total||0; byMuaj[key].count++;
  });
  const muajSort = Object.entries(byMuaj).sort(function(a,b) { return b[0].localeCompare(a[0]); });

  const byVit = {};
  shitjet.forEach(function(s) {
    if (!s.data) return;
    const v = new Date(s.data+'T12:00:00').getFullYear();
    if (!byVit[v]) byVit[v] = {total:0, count:0};
    byVit[v].total += s.total||0; byVit[v].count++;
  });
  const vitSort = Object.entries(byVit).sort(function(a,b) { return b[0]-a[0]; });

  function getWeek(ds) {
    const d = new Date(ds+'T12:00:00');
    const s = new Date(d); s.setDate(d.getDate()-d.getDay()+1);
    return s.toISOString().split('T')[0];
  }
  const byJava = {};
  shitjet.forEach(function(s) {
    if (!s.data) return;
    const k = getWeek(s.data);
    if (!byJava[k]) byJava[k] = {total:0, count:0};
    byJava[k].total += s.total||0; byJava[k].count++;
  });
  const javaSort = Object.entries(byJava).sort(function(a,b) { return b[0].localeCompare(a[0]); });

  const byProd = {};
  shitjet.forEach(function(s) {
    const pk = (s.produkti||"").toLowerCase().trim();
    if (!byProd[pk]) byProd[pk] = {total:0, count:0, emri:s.produkti||""};
    byProd[pk].total += s.total||0; byProd[pk].count++;
  });
  const prodSort = Object.entries(byProd).sort(function(a,b) { return b[1].count-a[1].count; }).slice(0,8);

  const byPun = {};
  shitjet.forEach(function(s) {
    const k = s.punetori||'-';
    if (!byPun[k]) byPun[k] = {total:0, count:0};
    byPun[k].total += s.total||0; byPun[k].count++;
  });
  const punSort = Object.entries(byPun).sort(function(a,b) { return b[1].total-a[1].total; });

  function makeRows(arr, labelFn, maxVal) {
    if (!arr.length) return '<div class="empty-state">Nuk ka te dhena.</div>';
    let h = '';
    arr.forEach(function(entry, i) {
      const k = entry[0], d = entry[1];
      const pct = maxVal > 0 ? (d.total/maxVal*100) : 0;
      h += '<div class="top-row">'
        + (labelFn === 'rank' ? '<span class="rank">#' + (i+1) + '</span>' : '<div class="pun-avatar small">' + k[0].toUpperCase() + '</div>')
        + '<div class="top-info"><strong>' + labelFn(k, d) + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    return h;
  }

  let tabContent = '';
  // ── Krahasim muaj me muaj ──
  const muajSortKrahasim = Object.entries(byMuaj).sort(function(a,b) { return a[0].localeCompare(b[0]); });
  let krahasimRows = '';
  if (muajSortKrahasim.length >= 2) {
    for (let i = muajSortKrahasim.length - 1; i >= 1; i--) {
      const cur = muajSortKrahasim[i], prev = muajSortKrahasim[i-1];
      const diff = cur[1].total - prev[1].total;
      const pct = prev[1].total > 0 ? ((diff / prev[1].total) * 100) : 0;
      const arrow = diff >= 0 ? '&#9650;' : '&#9660;';
      const col = diff >= 0 ? 'var(--success)' : 'var(--error)';
      krahasimRows += '<div class="top-row">'
        + '<div class="top-info"><strong>' + muajet[cur[1].muaji] + ' ' + cur[1].viti + '</strong>'
        + '<span>' + muajet[prev[1].muaji] + ': ' + fm(prev[1].total) + '</span></div>'
        + '<div style="text-align:right"><div class="top-total">' + fm(cur[1].total) + '</div>'
        + '<div style="font-size:12px;color:' + col + ';font-weight:600">' + arrow + ' ' + Math.abs(pct).toFixed(1) + '%'
        + ' (' + (diff >= 0 ? '+' : '') + fm(diff) + ')</div></div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(100, Math.abs(pct)) + '%;background:' + col + '"></div></div></div>';
    }
  } else {
    krahasimRows = '<div class="empty-state">Duhen te pakten 2 muaj te dhena.</div>';
  }

  // ── Ora me produktive ──
  const byOra = {};
  for (let h = 0; h < 24; h++) byOra[h] = {total: 0, count: 0};
  shitjet.forEach(function(s) {
    if (!s.krijuar || !s.krijuar.seconds) return;
    const ora = new Date(s.krijuar.seconds * 1000).getHours();
    byOra[ora].total += (s.total||0);
    byOra[ora].count++;
  });
  const oratAktive = Object.entries(byOra).filter(function(e) { return e[1].count > 0; });
  const maxOra = oratAktive.length ? Math.max.apply(null, oratAktive.map(function(e) { return e[1].total; })) : 1;
  let oraRows = '';
  if (oratAktive.length) {
    oratAktive.sort(function(a,b) { return b[1].total - a[1].total; }).slice(0, 8).forEach(function(entry) {
      const h = parseInt(entry[0]);
      const d = entry[1];
      const lbl = String(h).padStart(2,'0') + ':00 - ' + String(h+1).padStart(2,'0') + ':00';
      const pct = maxOra > 0 ? (d.total/maxOra*100) : 0;
      oraRows += '<div class="top-row"><div class="top-info"><strong>' + lbl + '</strong>'
        + '<span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
  } else {
    oraRows = '<div class="empty-state">Nuk ka te dhena me timestamp (shitjet e vjetra nuk kane ore).</div>';
  }

  if (raporteTab === 'muaji') {
    const max = muajSort.length ? muajSort[0][1].total : 1;
    let h = '';
    muajSort.forEach(function(entry) {
      const k = entry[0], d = entry[1];
      const pct = max > 0 ? (d.total/max*100) : 0;
      h += '<div class="top-row"><div class="top-info"><strong>' + muajet[d.muaji] + ' ' + d.viti + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    tabContent = h || '<div class="empty-state">Nuk ka te dhena.</div>';
  } else if (raporteTab === 'viti') {
    const max = vitSort.length ? vitSort[0][1].total : 1;
    let h = '';
    vitSort.forEach(function(entry) {
      const k = entry[0], d = entry[1];
      const pct = max > 0 ? (d.total/max*100) : 0;
      h += '<div class="top-row"><div class="top-info"><strong>' + k + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    tabContent = h || '<div class="empty-state">Nuk ka te dhena.</div>';
  } else if (raporteTab === 'java') {
    const max = javaSort.length ? javaSort[0][1].total : 1;
    let h = '';
    javaSort.forEach(function(entry) {
      const k = entry[0], d = entry[1];
      const ds = new Date(k+'T12:00:00');
      const de = new Date(ds); de.setDate(ds.getDate()+6);
      const lbl = ds.toLocaleDateString('sq',{day:'numeric',month:'short'}) + ' - ' + de.toLocaleDateString('sq',{day:'numeric',month:'short',year:'numeric'});
      const pct = max > 0 ? (d.total/max*100) : 0;
      h += '<div class="top-row"><div class="top-info"><strong>' + lbl + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    tabContent = h || '<div class="empty-state">Nuk ka te dhena.</div>';
  } else if (raporteTab === 'produkte') {
    const max = prodSort.length ? prodSort[0][1].total : 1;
    let h = '';
    prodSort.forEach(function(entry, i) {
      const k = entry[0], d = entry[1];
      const pct = max > 0 ? (d.total/max*100) : 0;
      const emri = d.emri ? d.emri.charAt(0).toUpperCase() + d.emri.slice(1).toLowerCase() : k;
      h += '<div class="top-row"><span class="rank">#' + (i+1) + '</span>'
        + '<div class="top-info"><strong>' + emri + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    tabContent = h || '<div class="empty-state">Nuk ka te dhena.</div>';
  } else if (raporteTab === 'punetore') {
    const max = punSort.length ? punSort[0][1].total : 1;
    let h = '';
    punSort.forEach(function(entry) {
      const k = entry[0], d = entry[1];
      const pct = max > 0 ? (d.total/max*100) : 0;
      h += '<div class="top-row"><div class="pun-avatar small">' + k[0].toUpperCase() + '</div>'
        + '<div class="top-info"><strong>' + k + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    tabContent = h || '<div class="empty-state">Nuk ka te dhena.</div>';
  } else if (raporteTab === 'krahasim') {
    tabContent = krahasimRows;
  } else if (raporteTab === 'ora') {
    tabContent = oraRows;
  } else if (raporteTab === 'arka') {
    tabContent = '<div id="arka-rep-wrap"><div class="empty-state">Duke ngarkuar...</div></div>';
  }

  document.getElementById('content').innerHTML =
    '<div class="page-header"><h1 class="page-title">Raporte</h1></div>'
    + '<div class="stats-grid">'
    + '<div class="stat-card accent"><div class="stat-icon">&#128176;</div><div class="stat-info"><span class="stat-val">' + fm(muajSort[0]?.[1]?.total||0) + '</span><span class="stat-label">Ky Muaj</span></div></div>'
    + '<div class="stat-card"><div class="stat-icon">&#128197;</div><div class="stat-info"><span class="stat-val">' + fm(vitSort[0]?.[1]?.total||0) + '</span><span class="stat-label">Ky Vit</span></div></div>'
    + '<div class="stat-card"><div class="stat-icon">&#127942;</div><div class="stat-info"><span class="stat-val">' + fm(totalGjith) + '</span><span class="stat-label">Total</span></div></div>'
    + '</div>'
    + '<div class="raporte-tabs">'
    + '<button class="rtab ' + (raporteTab==='muaji'?'active':'') + '" onclick="switchRTab(\'muaji\')">Muajt</button>'
    + '<button class="rtab ' + (raporteTab==='viti'?'active':'') + '" onclick="switchRTab(\'viti\')">Vitet</button>'
    + '<button class="rtab ' + (raporteTab==='java'?'active':'') + '" onclick="switchRTab(\'java\')">Javet</button>'
    + '<button class="rtab ' + (raporteTab==='produkte'?'active':'') + '" onclick="switchRTab(\'produkte\')">Produktet</button>'
    + '<button class="rtab ' + (raporteTab==='punetore'?'active':'') + '" onclick="switchRTab(\'punetore\')">Punetoret</button>'
    + '<button class="rtab ' + (raporteTab==='krahasim'?'active':'') + '" onclick="switchRTab(\'krahasim\')">Krahasim</button>'
    + '<button class="rtab ' + (raporteTab==='ora'?'active':'') + '" onclick="switchRTab(\'ora\')">Ora Prod.</button>'
    + '<button class="rtab ' + (raporteTab==='arka'?'active':'') + '" onclick="switchRTab(\'arka\')">Arka</button>'
    + '</div>'
    + '<div class="chart-section">' + tabContent + '</div>';

  if (raporteTab === 'arka') ngarkoArkaRap();
}

async function ngarkoArkaRap() {
  try {
    const snap = await getDocs(query(collection(db, 'arka'), orderBy('krijuar','desc')));
    const arkat = snap.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); });
    const el = document.getElementById('arka-rep-wrap');
    if (!el) return;
    if (!arkat.length) { el.innerHTML = '<div class="empty-state">Nuk ka raporte arka.</div>'; return; }
    let h = '';
    arkat.forEach(function(a) {
      const ok2 = a.rezultati === 'ok';
      h += '<div class="top-row" style="flex-direction:column;align-items:flex-start;gap:6px;padding:14px 0">'
        + '<div style="display:flex;width:100%;justify-content:space-between;align-items:center">'
        + '<div><strong>' + (a.punetori||'-') + '</strong> <span style="font-size:12px;color:var(--text2)">' + a.data + '</span></div>'
        + '<span style="font-weight:700;color:' + (ok2?'var(--success)':'var(--error)') + '">' + (ok2?'OK':'Dallim') + '</span></div>'
        + '<div style="font-size:12px;color:var(--text2)">'
        + 'Fillim: ' + fm(a.fillimiArkes||0) + ' | Shitje: +' + fm(a.totalShitje||0)
        + (a.shumaReale !== undefined ? ' | Reale: ' + fm(a.shumaReale) : '')
        + (a.dallimi ? ' | Dallim: ' + fm(a.dallimi) : '')
        + '</div>'
        + (a.koment ? '<div style="font-size:12px;font-style:italic;color:var(--text2)">' + a.koment + '</div>' : '')
        + '</div>';
    });
    el.innerHTML = h;
  } catch(e) { console.warn('arka rep:', e.message); }
}

function renderGaleria() {
  if (!isAdmin) return;
  const fotot = shitjet.filter(function(s) { return s.fotoUrl; }).sort(function(a,b) {
    return (b.krijuar?.seconds||0) - (a.krijuar?.seconds||0);
  });
  let html = '<div class="page-header"><h1 class="page-title">Galeria</h1></div>';
  if (!fotot.length) { html += '<div class="empty-state">Nuk ka foto.</div>'; }
  html += '<div class="galeria-grid">';
  fotot.forEach(function(s) {
    if (s.id && s.fotoUrl) fotoMap[s.id] = s.fotoUrl;
    const dt = s.krijuar?.seconds ? new Date(s.krijuar.seconds*1000).toLocaleDateString('sq',{day:'numeric',month:'long',year:'numeric'}) : (s.data||'-');
    html += '<div class="galeria-card" onclick="shfaqFotoById(\'' + (s.id||'') + '\')">'

      + '<span>' + (s.punetori||'-') + ' &bull; ' + fm(s.total) + '</span></div></div>';

}

window.shkarkoCSV = function() {
  if (!shitjet.length) return err('Nuk ka te dhena!');
  const hdrs = ['Data','Produkti','Sasia','Njesia','Cmimi','Total','Klienti','Punetori','Shenimi'];
  const rows = shitjet.slice().sort(function(a,b) { return (b.data||'').localeCompare(a.data||''); }).map(function(s) {
    return [s.data||'', s.produkti||'', s.sasia||'', s.njesia||'cop',
      (s.cmimi||0).toFixed(2), (s.total||0).toFixed(2),
      s.klienti||'', s.punetori||'', s.shen||''];
  });
  const tot = shitjet.reduce(function(a,s) { return a+(s.total||0); }, 0);
  rows.push(['','','','','TOTAL',(tot).toFixed(2),'','','']);
  const csv = [hdrs].concat(rows).map(function(r) {
    return r.map(function(c) { return '"' + String(c).replace(/"/g,'""') + '"'; }).join(',');
  }).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'DOHA_Shitjet_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  ok('CSV u shkarkua!');
};

window.konfirmoFshijBitrix = function() {
  const bitrixCount = shitjet.filter(function(s) { return s.punetoriUid === 'bitrix_import'; }).length;
  if (!bitrixCount) return err('Nuk ka shitje Bitrix per te fshire!');
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = '<div class="modal-box" style="border-color:var(--error)">'
    + '<h3 style="text-align:center;margin-bottom:12px;color:var(--error)">Fshij Bitrix</h3>'
    + '<p style="font-size:14px;color:var(--text2);text-align:center;margin-bottom:20px">Do te fshihen <strong style="color:var(--text)">' + bitrixCount + ' shitje</strong> te importuara nga Bitrix24. Shkruaj <strong style="color:var(--error)">FSHIJ</strong> per te konfirmuar:</p>'
    + '<input type="text" id="konf-bitrix-inp" placeholder="FSHIJ" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px;color:var(--text);font-size:16px;text-align:center;font-family:DM Sans,sans-serif;outline:none;margin-bottom:14px">'
    + '<div style="display:flex;gap:10px">'

    + '<button onclick="ekzekutoFshijBitrix()" style="flex:1;background:var(--error);border:none;border-radius:10px;padding:12px;color:#fff;cursor:pointer;font-weight:700;font-family:DM Sans,sans-serif;">Fshij</button>'
    + '</div></div>';
  document.body.appendChild(ov);
};

window.ekzekutoFshijBitrix = async function() {
  if (document.getElementById('konf-bitrix-inp')?.value?.trim() !== 'FSHIJ') return err('Shkruaj sakte: FSHIJ');
  document.querySelector('.modal-overlay')?.remove();
  const bitrixShitjet = shitjet.filter(function(s) { return s.punetoriUid === 'bitrix_import'; });
  if (!bitrixShitjet.length) return err('Nuk ka shitje Bitrix!');
  try {
    // Delete in chunks of 50 to avoid timeout
    const CHUNK = 50;
    for (let i = 0; i < bitrixShitjet.length; i += CHUNK) {
      await Promise.all(bitrixShitjet.slice(i, i + CHUNK).map(function(s) {
        return deleteDoc(doc(db, 'shitjet', s.id));
      }));
    }
    ok('U fshin ' + bitrixShitjet.length + ' shitje Bitrix!');
    if (currentView === 'backup') renderBackup();
  } catch(e) { err(e.message); }
};

// ── RAPORT DITOR TELEGRAM ─────────────────────────
async function dergoPDFRaportDitor(sotStr, punetor, fillimiArkes, totalShitje, gjithsej, rezultati, dallimi, koment, totalShpenzime) {
  totalShpenzime = totalShpenzime || 0;
  try {
    const shitjetSot = shitjet.filter(function(s) { return s.data === sotStr && s.punetori === punetor; });
    const oraHapur = arkaSOT && arkaSOT.krijuar && arkaSOT.krijuar.seconds
      ? new Date(arkaSOT.krijuar.seconds * 1000).toLocaleTimeString('sq', {hour:'2-digit', minute:'2-digit'})
      : '--:--';
    const oraMbyllur = new Date().toLocaleTimeString('sq', {hour:'2-digit', minute:'2-digit'});

    // Lista produkteve
    const byProd = {};
    shitjetSot.forEach(function(s) {
      const pk = (s.produkti||'').toLowerCase().trim();
      if (!byProd[pk]) byProd[pk] = {sasi:0, total:0, emri:s.produkti||''};
      byProd[pk].sasi += (s.sasia||0);
      byProd[pk].total += (s.total||0);
    });
    const prodSorted = Object.values(byProd).sort(function(a,b) { return b.total-a.total; });
    let prodLines = '';
    prodSorted.forEach(function(d) {
      prodLines += '  ' + d.emri + ' x' + d.sasi + ' = ' + fm(d.total) + '\n';
    });
    if (!prodLines) prodLines = '  (Nuk ka shitje)\n';

    // Produkti yll i dites
    const yll = prodSorted.length ? prodSorted[0].emri + ' (' + prodSorted[0].sasi + ' cope, ' + fm(prodSorted[0].total) + ')' : null;

    // Shitja me e madhe
    const maxShitje = shitjetSot.reduce(function(max, s) { return (s.total||0) > (max.total||0) ? s : max; }, {total:0});

    // Historiku i punetorit
    const shitjetPunetor = shitjet.filter(function(s) { return s.punetori === punetor && s.data && s.data !== sotStr; });
    const totalPerDite = {};
    shitjetPunetor.forEach(function(s) {
      if (!totalPerDite[s.data]) totalPerDite[s.data] = 0;
      totalPerDite[s.data] += (s.total||0);
    });

    // Mesatare muaji
    const muaj = sotStr.substring(0,7);
    const shitjetMuaj = shitjet.filter(function(s) { return (s.data||'').startsWith(muaj) && s.data !== sotStr; });
    const ditetMuaj = [...new Set(shitjetMuaj.map(function(s) { return s.data; }))];
    const mesatareMuaj = ditetMuaj.length > 0
      ? shitjetMuaj.reduce(function(a,s) { return a+(s.total||0); }, 0) / ditetMuaj.length : 0;

    // Rekord personal
    const rekordi = Object.values(totalPerDite).length ? Math.max.apply(null, Object.values(totalPerDite)) : 0;

    // Streak - dite rresht mbi mesatare
    let streak = 0;
    if (mesatareMuaj > 0) {
      const ditetSort = Object.entries(totalPerDite).sort(function(a,b) { return b[0].localeCompare(a[0]); });
      for (var i = 0; i < ditetSort.length; i++) {
        if (ditetSort[i][1] >= mesatareMuaj) streak++;
        else break;
      }
    }

    // Dita e javes historike
    const sotDate = new Date(sotStr + 'T12:00:00');
    const ditetJavesEmri = ['E Diel','E Hene','E Marte','E Merkure','E Enjte','E Premte','E Shtune'];
    const ditaJaves = ditetJavesEmri[sotDate.getDay()];
    const ditetNjejta = Object.entries(totalPerDite).filter(function(e) {
      return new Date(e[0]+'T12:00:00').getDay() === sotDate.getDay();
    });
    const mesatareDitaJaves = ditetNjejta.length > 0
      ? ditetNjejta.reduce(function(a,e) { return a+e[1]; }, 0) / ditetNjejta.length : 0;

    // E njejta dite java e kaluar
    const javEKaluar = new Date(sotDate); javEKaluar.setDate(sotDate.getDate()-7);
    const javEKaluarStr = javEKaluar.toISOString().split('T')[0];
    const totalJavaKaluar = totalPerDite[javEKaluarStr] || 0;

    // Ditet e mbetura te muajit
    const ditetKaluara = ditetMuaj.length + 1;
    const totalMuajDeriTani = shitjetMuaj.reduce(function(a,s) { return a+(s.total||0); }, 0) + totalShitje;
    const ditetMbetura = Math.max(0, 26 - ditetKaluara);
    const nevojitetPerDite = ditetMbetura > 0 && mesatareMuaj > 0
      ? Math.max(0, (mesatareMuaj * 26 - totalMuajDeriTani) / ditetMbetura) : 0;

    // Efikasiteti
    let efikasiteti = '';
    if (arkaSOT && arkaSOT.krijuar && arkaSOT.krijuar.seconds && shitjetSot.length > 0) {
      const oretPune = (Date.now() - arkaSOT.krijuar.seconds * 1000) / 3600000;
      if (oretPune > 0.5) efikasiteti = (shitjetSot.length / oretPune).toFixed(1) + ' shitje/ore';
    }

    // Nderto komentet
    const komentet = [];

    // 1. Vleresim kryesor i dites
    if (shitjetSot.length === 0) {
      komentet.push('Sot nuk u be asnje shitje.');
    } else if (mesatareMuaj > 0) {
      const diff = ((totalShitje - mesatareMuaj) / mesatareMuaj * 100);
      if (totalShitje >= mesatareMuaj * 1.3) {
        komentet.push('Dite shkelqyese! +' + diff.toFixed(0) + '% mbi mesataren e muajit (' + fm(mesatareMuaj) + '/dite). Keshtu duhet!');
      } else if (totalShitje >= mesatareMuaj * 1.05) {
        komentet.push('Dite e mire! +' + diff.toFixed(0) + '% mbi mesataren e muajit (' + fm(mesatareMuaj) + '/dite).');
      } else if (totalShitje >= mesatareMuaj * 0.8) {
        komentet.push('Dite normale, afer mesatares se muajit (' + fm(mesatareMuaj) + '/dite).');
      } else {
        komentet.push('Dite me pak shitje se zakonisht, ' + Math.abs(diff).toFixed(0) + '% nen mesataren (' + fm(mesatareMuaj) + '/dite).');
      }
    }

    // 2. Rekord personal
    if (totalShitje > rekordi && rekordi > 0) {
      komentet.push('REKORD PERSONAL! Dita juaj me e mire ndonjehere!');
    } else if (rekordi > 0 && totalShitje >= rekordi * 0.9) {
      komentet.push('Shume afer rekordit personal (' + fm(rekordi) + '). Vetem ' + fm(rekordi - totalShitje) + ' larg!');
    }

    // 3. Streak
    if (streak >= 3) {
      komentet.push(streak + ' dite rresht mbi mesatare - vazhdoni keshtu!');
    }

    // 4. Kontekst dite javes
    if (mesatareDitaJaves > 0 && shitjetSot.length > 0) {
      const diffJave = ((totalShitje - mesatareDitaJaves) / mesatareDitaJaves * 100);
      if (totalShitje >= mesatareDitaJaves * 1.15) {
        komentet.push(ditaJaves + ' historikisht mesatarisht ' + fm(mesatareDitaJaves) + ' - sot e kalonit!');
      } else if (totalShitje < mesatareDitaJaves * 0.85) {
        komentet.push(ditaJaves + ' zakonisht ' + fm(mesatareDitaJaves) + ' - sot pak me dobet se zakoni.');
      }
    }

    // 5. Krahasim java e kaluar
    if (totalJavaKaluar > 0 && shitjetSot.length > 0) {
      const diffJk = ((totalShitje - totalJavaKaluar) / totalJavaKaluar * 100);
      if (Math.abs(diffJk) >= 15) {
        const shenjJk = diffJk >= 0 ? '+' : '';
        komentet.push(ditaJaves + ' e kaluar: ' + fm(totalJavaKaluar) + ' (' + shenjJk + diffJk.toFixed(0) + '% ndryshim).');
      }
    }

    // 6. Produkti yll
    if (yll && shitjetSot.length > 0) {
      komentet.push('Ylli i dites: ' + yll + '.');
    }

    // 7. Shitja me e madhe
    if (maxShitje.total > 0 && maxShitje.produkti) {
      komentet.push('Shitja me e madhe: ' + maxShitje.produkti + ' ' + fm(maxShitje.total) + '.');
    }

    // 8. Efikasiteti
    if (efikasiteti) {
      komentet.push('Ritmi i dites: ' + efikasiteti + '.');
    }

    // 9. Motivim per ditet e mbetura
    if (ditetMbetura > 0 && nevojitetPerDite > 0 && shitjetSot.length > 0) {
      komentet.push('Muaji: ' + fm(totalMuajDeriTani) + ' deri tani. Nevojiten ~' + fm(nevojitetPerDite) + '/dite per ' + ditetMbetura + ' ditet e mbetura.');
    }

    // 10. Motivim kur mungon pak per mesatare
    if (mesatareMuaj > 0 && totalShitje < mesatareMuaj && (mesatareMuaj - totalShitje) <= mesatareMuaj * 0.15) {
      komentet.push('Edhe ' + fm(mesatareMuaj - totalShitje) + ' dhe e kalonit mesataren e muajit!');
    }

    const statusLine = rezultati === 'ok' ? 'BARAZUAR' : 'DALLIM ' + fm(dallimi) + ' | ' + koment;

    const msg = 'RAPORT DITOR - DOHA Accessories\n'
      + 'Punetori: ' + punetor + '\n'
      + 'Data: ' + sotStr + '  |  ' + oraHapur + ' - ' + oraMbyllur + '\n'
      + '----------------------------\n'
      + prodLines
      + '----------------------------\n'
      + 'Fillim arkes: ' + fm(fillimiArkes) + '\n'

window.shkarkoPDF = function(periudha, dataFillim, dataMbarim) {
  const lista = shitjet.filter(function(s) {
    return s.data >= dataFillim && s.data <= dataMbarim;
  });
  if (!lista.length) return err('Nuk ka shitje per kete periudhe!');

  // Group by date
  const byDate = {};
  lista.forEach(function(s) {
    if (!byDate[s.data]) byDate[s.data] = [];
    byDate[s.data].push(s);
  });

  // Group by punetor
  const byPunetor = {};
  lista.forEach(function(s) {
    if (!byPunetor[s.punetori]) byPunetor[s.punetori] = 0;
    byPunetor[s.punetori] += (s.total||0);
  });

  // Group by product for chart
  const byProd = {};

  const totalGjith = lista.reduce(function(a,s) { return a+(s.total||0); }, 0);

  // Chart data - top 7 products
  const topProd = Object.entries(byProd).sort(function(a,b) { return b[1]-a[1]; }).slice(0,7);

  // Build chart SVG

  let bars = '';
  topProd.forEach(function(p, i) {

    bars += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + h + '" rx="4" fill="#F0B429"/>';
    bars += '<text x="' + (x + barW/2) + '" y="' + (y - 4) + '" text-anchor="middle" font-size="9" fill="#888">' + fm(p[1]).replace('EUR ','') + '</text>';

window.shkarkoExcel = function(dataFillim, dataMbarim) {
  const lista = shitjet.filter(function(s) {
    return s.data >= dataFillim && s.data <= dataMbarim;
  });
  if (!lista.length) return err('Nuk ka shitje per kete periudhe!');

  const byPunetor = {};
  lista.forEach(function(s) {
    if (!byPunetor[s.punetori]) byPunetor[s.punetori] = 0;
    byPunetor[s.punetori] += (s.total||0);
  });
  const byDate = {};
  lista.forEach(function(s) {
    if (!byDate[s.data]) byDate[s.data] = 0;
    byDate[s.data] += (s.total||0);
  });

  const BOM = '\uFEFF';
  let csv = BOM + 'Data,Produkti,Sasia,Njesia,Cmimi EUR,Total EUR,Punetori,Klienti,Shenimi\n';
  lista.sort(function(a,b) { return a.data.localeCompare(b.data); }).forEach(function(s) {
    const row = [
      s.data, '"' + (s.produkti||'').replace(/"/g,'""') + '"',
      (s.sasia||0), (s.njesia||'cop'),
      (s.cmimi||0).toFixed(2), (s.total||0).toFixed(2),
      (s.punetori||''), '"' + (s.klienti||'').replace(/"/g,'""') + '"',
      '"' + (s.shen||'').replace(/"/g,'""') + '"'
    ];
    csv += row.join(',') + '\n';
  });

  // Summary sheet at bottom
  csv += '\n\nPERMBLEDHJA\n';
  csv += 'Punetori,Total EUR\n';
  Object.entries(byPunetor).sort(function(a,b) { return b[1]-a[1]; }).forEach(function(e) {
    csv += e[0] + ',' + e[1].toFixed(2) + '\n';
  });
  csv += '\nData,Total EUR\n';
  Object.entries(byDate).sort(function(a,b) { return a[0].localeCompare(b[0]); }).forEach(function(e) {
    csv += e[0] + ',' + e[1].toFixed(2) + '\n';
  });
  csv += '\nGJITHSEJ,' + lista.reduce(function(a,s) { return a+(s.total||0); }, 0).toFixed(2) + '\n';

  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'DOHA_' + dataFillim + '_' + dataMbarim + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  ok('Excel u shkarkua!');
};

  let neP = '';
  neProc.forEach(function(p) {
    const data = p.krijuar && p.krijuar.seconds ? new Date(p.krijuar.seconds*1000).toLocaleDateString('sq',{day:'numeric',month:'short',year:'numeric'}) : (p.data||'');
    const ora = p.krijuar && p.krijuar.seconds ? new Date(p.krijuar.seconds*1000).toLocaleTimeString('sq',{hour:'2-digit',minute:'2-digit'}) : '';

          + '<span style="flex:1">' + pr.emri + '</span>'
          + '<span style="color:var(--accent);font-weight:600">' + fm(pr.cmimi) + '</span>'
          + '<button onclick="fshiProduktPoste(' + JSON.stringify(p.id) + ',' + i + ')" style="background:none;border:none;color:var(--error);cursor:pointer;font-size:18px;line-height:1">&times;</button>'
          + '</div>';
      });
      const total = produktet.reduce(function(a,pr) { return a+(pr.cmimi||0); }, 0);
      prodH += '<div style="border-top:1px solid var(--border);padding-top:8px;display:flex;justify-content:space-between;font-weight:600;font-size:13px">'
        + '<span>Total:</span><span style="color:var(--accent)">' + fm(total) + '</span></div>';
    } else {
      prodH = '<div style="font-size:13px;color:var(--text2);padding:6px 0">Shto produktet dhe cmimet:</div>';
    }
    neP += '<div class="form-card" style="border-color:rgba(240,180,41,0.5)">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">'
      + '<div><strong>&#128230; Poste e re</strong><div style="font-size:12px;color:var(--text2);margin-top:3px">' + (p.punetori||'') + ' &bull; ' + data + ' ora ' + ora + '</div></div>'
      + '<span style="background:rgba(240,180,41,0.15);color:var(--accent);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600">NE PRITJE</span></div>'
      + '<div id="pp-list-' + p.id + '">' + prodH + '</div>'
      + '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">'

      + '</div></div>';

  let prH = proc.slice(0,10).map(function(p) {
    const data = p.krijuar && p.krijuar.seconds ? new Date(p.krijuar.seconds*1000).toLocaleDateString('sq') : (p.data||'');
    const total = (p.produktet||[]).reduce(function(a,pr) { return a+(pr.cmimi||0); }, 0);

  }).join('') || '';

  el.innerHTML =

    + (neProc.length ? neP : '<div class="form-card"><div class="empty-state">&#10003; Nuk ka poste ne pritje.</div></div>')

window.konfirmoShtoProdukt = async function(postaId) {
  const emri = document.getElementById('pp-emri')?.value?.trim();
  const cmimi = parseFloat(document.getElementById('pp-cmimi')?.value);
  if (!emri) return err('Shkruaj emrin!');
  if (isNaN(cmimi) || cmimi < 0) return err('Shkruaj cmimin!');
  document.getElementById('modal-pp')?.remove();
  try {
    const posta = postat.find(function(p) { return p.id === postaId; });
    const produktet = (posta?.produktet||[]).concat([{emri:emri, cmimi:cmimi}]);
    await updateDoc(doc(db, 'postat', postaId), {produktet: produktet});
  } catch(e) { err(e.message); }
};

window.fshiProduktPoste = async function(postaId, idx) {
  try {
    const posta = postat.find(function(p) { return p.id === postaId; });
    const produktet = (posta?.produktet||[]).filter(function(_,i) { return i !== idx; });
    await updateDoc(doc(db, 'postat', postaId), {produktet: produktet});
  } catch(e) { err(e.message); }
};

window.procesoPosta = async function(postaId) {
  const posta = postat.find(function(p) { return p.id === postaId; });
  if (!posta || !posta.produktet || !posta.produktet.length) return err('Shto te pakten nje produkt!');
  try {
    await Promise.all(posta.produktet.map(function(pr) {
      return addDoc(collection(db, 'shitjet'), {
        produkti: pr.emri, sasia: 1, cmimi: pr.cmimi, njesia: 'cop', total: pr.cmimi,
        data: posta.data || new Date().toISOString().split('T')[0],
        punetori: posta.punetori, punetoriUid: posta.punetoriUid,
        klienti: '', shen: 'Nga posta ' + (posta.data||''),
        krijuar: serverTimestamp(), ndryshuar: serverTimestamp(), ngaPosta: true,
      });
    }));
    const total = posta.produktet.reduce(function(a,pr) { return a+(pr.cmimi||0); }, 0);
    await updateDoc(doc(db, 'postat', postaId), {procesuar:true, procesuarNe:serverTimestamp(), totalPosta:total});
    ok('Posta u procesua! ' + posta.produktet.length + ' produkte => shitje.');
  } catch(e) { err(e.message); }
};

    const ora = s.krijuar && s.krijuar.seconds
      ? new Date(s.krijuar.seconds*1000).toLocaleTimeString('sq',{hour:'2-digit',minute:'2-digit'}) : '';
    rows += '<div class="top-row">'
      + '<div class="top-info"><strong>' + (s.pershkrimi||'Shpenzim') + '</strong>'
      + '<span>' + ora + (s.fotoUrl ? ' &bull; <span style="color:var(--accent)">Ka foto</span>' : '') + '</span></div>'
      + '<div style="text-align:right"><div style="font-weight:700;color:var(--error)">-' + fm(s.shuma||0) + '</div>'
      + (isAdmin ? '' : '<button onclick="fshiShpenzimin(\'' + s.id + '\')" style="background:none;border:none;color:var(--error);cursor:pointer;font-size:12px;opacity:0.7">fshij</button>')
      + '</div></div>';
  });

  document.getElementById('content').innerHTML =
    '<div class="page-header"><h1 class="page-title">Shpenzime</h1></div>'
    + '<div class="stats-grid">'
    + '<div class="stat-card accent"><div class="stat-icon">&#128178;</div><div class="stat-info"><span class="stat-val">' + fm(totalSot) + '</span><span class="stat-label">Sot</span></div></div>'
    + '<div class="stat-card"><div class="stat-icon">&#128222;</div><div class="stat-info"><span class="stat-val">' + shpenzimetSot.length + '</span><span class="stat-label">Shpenzime</span></div></div>'
    + '</div>'
    + '<div class="form-card">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    + '<div class="section-title">Sot - ' + sotStr + '</div>'
    + '<button class="btn-primary small" onclick="shtoShpenzim()">+ Shto</button></div>'
    + (rows || '<div class="empty-state">Nuk ka shpenzime sot.</div>')
    + '</div>';
}

window.shtoShpenzim = function() {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.id = 'modal-shpenzim';
  ov.innerHTML = '<div class="modal-box">'
    + '<h3 style="margin-bottom:16px">Shto Shpenzim</h3>'
    + '<div class="form-group" style="margin-bottom:12px"><label>Pershkrimi</label>'
    + '<input type="text" id="sh-pershk" placeholder="p.sh. Qese, Transport, Ushqim..." style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px;color:var(--text);font-family:DM Sans,sans-serif;outline:none"></div>'
    + '<div class="form-group" style="margin-bottom:12px"><label>Shuma (EUR)</label>'
    + '<input type="number" id="sh-shuma" placeholder="0.00" min="0.01" step="0.01" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px;color:var(--text);font-family:DM Sans,sans-serif;outline:none"></div>'
    + '<div class="form-group" style="margin-bottom:16px"><label>Foto (opsionale)</label>'
    + '<div style="display:flex;gap:8px">'
    + '<button type="button" onclick="document.getElementById(\'sh-foto-input\').click()" class="btn-secondary small" style="flex:1">Kamera / Galeria</button>'
    + '</div>'
    + '<input type="file" id="sh-foto-input" accept="image/*" capture="environment" style="display:none" onchange="shfaqFotoShpenzim(this)">'
    + '<div id="sh-foto-preview" style="margin-top:8px"></div></div>'
    + '<div style="display:flex;gap:10px">'
    + '<button onclick="document.getElementById(\'modal-shpenzim\').remove()" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);cursor:pointer;font-family:DM Sans,sans-serif">Anulo</button>'
    + '<button onclick="ruajShpenzimin()" style="flex:1;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;padding:12px;color:#111;font-weight:700;cursor:pointer;font-family:DM Sans,sans-serif">Shto</button>'
    + '</div></div>';
  document.body.appendChild(ov);
  setTimeout(function() { document.getElementById('sh-pershk').focus(); }, 100);
};

window.shfaqFotoShpenzim = function(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL('image/jpeg', 0.7);
      window._shFotoB64 = b64;
      document.getElementById('sh-foto-preview').innerHTML =
        '<img src="' + b64 + '" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:4px">';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
};

window.ruajShpenzimin = async function() {
  const pershk = document.getElementById('sh-pershk')?.value?.trim();
  const shuma = parseFloat(document.getElementById('sh-shuma')?.value);
  if (!pershk) return err('Shkruaj pershkrimin!');
  if (isNaN(shuma) || shuma <= 0) return err('Shkruaj shunen!');
  const sotStr = new Date().toISOString().split('T')[0];
  const punetor = (currentUser.email||'').split('@')[0];
  const ora = new Date().toLocaleTimeString('sq',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('modal-shpenzim')?.remove();
  try {
    const data = {
      pershkrimi: pershk,
      shuma: shuma,
      data: sotStr,
      punetori: punetor,
      punetoriUid: currentUser.uid,
      krijuar: serverTimestamp(),
    };
    if (window._shFotoB64) { data.fotoUrl = window._shFotoB64; window._shFotoB64 = null; }
    const docRef = await addDoc(collection(db, 'shpenzime'), data);
    shpenzimetSot.push(Object.assign({id: docRef.id}, data));
    await tg('SHPENZIM - DOHA Accessories\n\nPunetori: ' + punetor + '\nData: ' + sotStr + '\nOra: ' + ora + '\nPershkrimi: ' + pershk + '\nShuma: -' + fm(shuma));
    ok('Shpenzimi u shtua!');
    if (currentView === 'shpenzime') renderShpenzime();
  } catch(e) { err(e.message); }
};

window.fshiShpenzimin = async function(id) {
  try {
    await deleteDoc(doc(db, 'shpenzime', id));
    shpenzimetSot = shpenzimetSot.filter(function(s) { return s.id !== id; });
    if (currentView === 'shpenzime') renderShpenzime();
  } catch(e) { err(e.message); }
};

async function ngarkoShpenzimetSot() {
  try {
    const sotStr = new Date().toISOString().split('T')[0];
    const snap = await getDocs(query(
      collection(db, 'shpenzime'),
      orderBy('krijuar', 'desc')
    ));
    shpenzimetSot = snap.docs
      .map(function(d) { return Object.assign({id: d.id}, d.data()); })
      .filter(function(s) { return s.data === sotStr && s.punetoriUid === currentUser.uid; });
  } catch(e) { console.warn('shpenzime:', e.message); }
}

// ── UTILS ─────────────────────────────────────────
// Global map: shitjeId -> fotoUrl (base64) - shmangim base64 inline ne onclick
const fotoMap = {};

window.shfaqFotoById = function(id) {
  const url = fotoMap[id];
  if (url) window.shfaqFoto(url);
};

window.shfaqFoto = function(url) {
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;';
  ov.innerHTML = '<img src="' + url + '" style="max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain;">';
  ov.onclick = function() { document.body.removeChild(ov); };
  document.body.appendChild(ov);
};

</script>
