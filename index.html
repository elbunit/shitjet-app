<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOHA Accessories</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, updateDoc, serverTimestamp, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyARmBXSgjkjm9tVZDZL2hV52DtoikbZMKs",
    authDomain: "doha-shitje.firebaseapp.com",
    projectId: "doha-shitje",
    storageBucket: "doha-shitje.firebasestorage.app",
    messagingSenderId: "228963407770",
    appId: "1:228963407770:web:77ef18bee8e9a22ec20c23"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const googleProvider = new GoogleAuthProvider();

  const ADMIN_EMAILS = [
    'elbunit.r@gmail.com',
    'mselmani70@gmail.com',
    'boldmedia.ks@gmail.com'
  ];

  // Handle redirect result pas kthimit nga Google login
  getRedirectResult(auth).then(async (result) => {
    if (result?.user) {
      const email = result.user.email?.toLowerCase();
      if (!ADMIN_EMAILS.includes(email)) {
        await signOut(auth);
        tregogabim("Ky Gmail nuk ka akses si admin!");
      }
    }
  }).catch(e => console.warn('Redirect result:', e));

  let currentUser = null;
  let isAdmin = false;
  let shitjet = [];
  let produktet = [];
  let punetoret = [];
  let klientet = [];
  let currentView = 'dashboard';
  let editingProdId = null;
  let unsubShitjet = null;

  // =====================================================
  // AUTENTIKIMI
  // =====================================================
  window.hyrSiAdmin = async () => {
    try {
      const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
      if (isMobile) {
        await signInWithRedirect(auth, googleProvider);
      } else {
        const result = await signInWithPopup(auth, googleProvider);
        const email = result.user.email?.toLowerCase();
        if (!ADMIN_EMAILS.includes(email)) {
          await signOut(auth);
          tregogabim("Ky Gmail nuk ka akses si admin!");
          return;
        }
      }
    } catch(e) { tregogabim("Gabim gjatë hyrjes: " + e.message); }
  };

  window.hyrSiPunetor = async () => {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value.trim();
    if (!username || !password) return tregogabim("Plotëso të gjitha fushat!");
    try {
      const email = username.toLowerCase() + '@doha-shitje.app';
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      tregogabim("Username ose fjalëkalimi i gabuar!");
    }
  };

  window.daleMe = async () => {
    if (unsubShitjet) unsubShitjet();
    await signOut(auth);
  };

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      isAdmin = ADMIN_EMAILS.includes(user.email?.toLowerCase());
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'flex';
      const displayName = isAdmin ? (user.displayName?.split(' ')[0] || 'Admin') : user.email?.split('@')[0] || 'Punëtor';
      document.getElementById('user-name').textContent = displayName;
      document.getElementById('user-avatar-text').textContent = displayName[0].toUpperCase();
      document.getElementById('user-avatar-text-desktop').textContent = displayName[0].toUpperCase();
      document.getElementById('role-badge').textContent = isAdmin ? '👑 Admin' : '👤 Punëtor';
      document.getElementById('role-badge-desktop').textContent = isAdmin ? '👑 Admin' : '👤 Punëtor';
      await ngarkoTeDhenat();
      filloBiserimin();
      document.getElementById('nav-punetoret').style.display = isAdmin ? 'flex' : 'none';
      document.getElementById('nav-raporte').style.display = isAdmin ? 'flex' : 'none';
      document.getElementById('nav-galeria').style.display = isAdmin ? 'flex' : 'none';
      document.getElementById('nav-backup').style.display = isAdmin ? 'flex' : 'none';

      document.getElementById('nav-klientet').style.display = isAdmin ? 'flex' : 'none';
      shkoTe('dashboard');
    } else {
      if (unsubShitjet) { unsubShitjet(); unsubShitjet = null; }
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
    }
  });

  // =====================================================
  // FIRESTORE
  // =====================================================
  async function ngarkoTeDhenat() {
    try {
      const [snapP, snapPun] = await Promise.all([
        getDocs(query(collection(db, 'produktet'), orderBy('emri'))),
        isAdmin ? getDocs(collection(db, 'punetoret')) : Promise.resolve({ docs: [] })
      ]);
      produktet = snapP.docs.map(d => ({ id: d.id, ...d.data() }));
      punetoret = snapPun.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) { tregogabim("Gabim ngarkimit: " + e.message); }
  }

  function filloBiserimin() {
    if (unsubShitjet) unsubShitjet();
    const q = query(collection(db, 'shitjet'), orderBy('krijuar', 'desc'));
    unsubShitjet = onSnapshot(q, (snap) => {
      shitjet = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === 'dashboard') renderDashboard();
      if (currentView === 'shitjet') renderShitjet();
      if (currentView === 'raporte') renderRaporte();
    });
  }

  const TG_TOKEN = '8627336914:AAF-SNxjFLW_2k8-lzLnZ82be5BzGNV-T90';
  const TG_CHAT  = '5636498688';

  async function dergoBotTelegram(teksti) {
    try {
      const url = 'https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage';
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: TG_CHAT, text: teksti, parse_mode: 'HTML' })
      });
      const json = await res.json();
      if (!json.ok) console.warn('Telegram error:', JSON.stringify(json));
      else console.log('Telegram OK');
    } catch(e) { console.warn('Telegram gabim:', e.message); }
  }

  window.shtoShitje = async (data) => {
    try {
      const punetorEmri = isAdmin ? 'Admin' : (currentUser.email?.split('@')[0] || 'Punëtor');
      await addDoc(collection(db, 'shitjet'), { ...data, punetori: punetorEmri, punetoriUid: currentUser.uid, krijuar: serverTimestamp() });
      tregosuksese("Shitja u ruajt! ✓");

      // Njoftim Telegram
      const shenTxt = data.shen ? ('\n📝 <b>Shënim:</b> ' + data.shen) : '';
      const msg = '🛍️ <b>Shitje e Re — DOHA Accessories</b>\n\n'
        + '📦 <b>Produkt:</b> ' + data.produkti + '\n'
        + '🔢 <b>Sasia:</b> ' + data.sasia + ' ' + (data.njesia||'cop') + '\n'
        + '💰 <b>Çmimi:</b> €' + data.cmimi + '\n'
        + '💵 <b>Total:</b> €' + data.total.toFixed(2) + '\n'
        + '👤 <b>Punëtori:</b> ' + punetorEmri + '\n'
        + '📅 <b>Data:</b> ' + data.data
        + shenTxt;
      await dergoBotTelegram(msg);

      shkoTe('shitjet');
    } catch(e) { tregogabim("Gabim: " + e.message); }
  };

  window.fshijShitje = async (id) => {
    if (!isAdmin) return tregogabim("Vetëm admini mund të fshijë!");
    if (!confirm("A jeni i sigurt?")) return;
    try { await deleteDoc(doc(db, 'shitjet', id)); tregosuksese("U fshi!"); }
    catch(e) { tregogabim("Gabim: " + e.message); }
  };

  window.shtoProd = async (data) => {
    if (!isAdmin) return;
    try {
      if (editingProdId) {
        await updateDoc(doc(db, 'produktet', editingProdId), data);
        const idx = produktet.findIndex(p => p.id === editingProdId);
        if (idx !== -1) produktet[idx] = { id: editingProdId, ...data };
        editingProdId = null;
        tregosuksese("U përditësua! ✓");
      } else {
        const ref = await addDoc(collection(db, 'produktet'), data);
        produktet.push({ id: ref.id, ...data });
        tregosuksese("U shtua! ✓");
      }
      renderProduktet();
    } catch(e) { tregogabim("Gabim: " + e.message); }
  };

  window.fshijProd = async (id) => {
    if (!isAdmin || !confirm("A jeni i sigurt?")) return;
    try {
      await deleteDoc(doc(db, 'produktet', id));
      produktet = produktet.filter(p => p.id !== id);
      tregosuksese("U fshi!"); renderProduktet();
    } catch(e) { tregogabim("Gabim: " + e.message); }
  };

  window.redaktoProd = (id) => {
    const p = produktet.find(x => x.id === id); if (!p) return;
    editingProdId = id;
    document.getElementById('prod-emri').value = p.emri;
    document.getElementById('prod-cmimi').value = p.cmimi;
    document.getElementById('prod-njesia').value = p.njesia || '';
    document.getElementById('prod-btn').textContent = '💾 Përditëso';
    document.getElementById('prod-cancel').style.display = 'inline-block';
  };

  window.anuloProd = () => {
    editingProdId = null;
    document.getElementById('prod-form').reset();
    document.getElementById('prod-btn').textContent = '+ Shto';
    document.getElementById('prod-cancel').style.display = 'none';
  };

  window.shtoPunetor = async () => {
    const emri = document.getElementById('pun-emri').value.trim();
    const username = document.getElementById('pun-user').value.trim().toLowerCase();
    const password = document.getElementById('pun-pass').value.trim();
    if (!emri || !username || !password) return tregogabim("Plotëso të gjitha fushat!");
    if (password.length < 6) return tregogabim("Fjalëkalimi min. 6 karaktere!");
    if (!/^[a-z0-9]+$/.test(username)) return tregogabim("Username: vetëm shkronja dhe numra!");
    try {
      const email = username + '@doha-shitje.app';
      const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=AIzaSyARmBXSgjkjm9tVZDZL2hV52DtoikbZMKs`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, displayName: emri, returnSecureToken: true })
      });
      const data = await res.json();
      if (data.error) {
        if (data.error.message === 'EMAIL_EXISTS') return tregogabim("Ky username ekziston tashmë!");
        return tregogabim("Gabim: " + data.error.message);
      }
      await setDoc(doc(db, 'punetoret', data.localId), { emri, username, email, uid: data.localId, krijuar: new Date().toISOString() });
      punetoret.push({ id: data.localId, emri, username, uid: data.localId });
      tregosuksese(`Punëtori "${emri}" u shtua! ✓`);
      document.getElementById('pun-form').reset();
      renderPunetoret();
    } catch(e) { tregogabim("Gabim: " + e.message); }
  };

  window.fshijPunetor = async (id) => {
    if (!confirm("A jeni i sigurt?")) return;
    try {
      await deleteDoc(doc(db, 'punetoret', id));
      punetoret = punetoret.filter(p => p.id !== id);
      tregosuksese("U fshi!"); renderPunetoret();
    } catch(e) { tregogabim("Gabim: " + e.message); }
  };

  // =====================================================
  // VIEWS
  // =====================================================
  window.shkoTe = (view) => {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelector(`[data-view="${view}"]`)?.classList.add('active');
    switch(view) {
      case 'dashboard': renderDashboard(); break;
      case 'shito': renderFormaShitjes(); break;
      case 'shitjet': renderShitjet(); break;
      case 'punetoret': renderPunetoret(); break;
      case 'raporte': renderRaporte(); break;
      case 'galeria': renderGaleria(); break;
      case 'backup': renderBackup(); break;
      case 'menaxhimi': renderMenaxhimi(); break;
      case 'klientet': renderKlientet(); break;
      case 'profili': renderProfili(); break;
    }
  };

  function renderDashboard() {
    const sot = new Date();
    const sotStr = sot.toISOString().split('T')[0];
    const shitjetSot = shitjet.filter(s => s.data === sotStr);
    const totalSot = shitjetSot.reduce((a,s) => a+(s.total||0), 0);
    const muajiKy = sot.getMonth(), vitiKy = sot.getFullYear();
    const totalMuaj = shitjet.filter(s => { const d = new Date(s.data); return d.getMonth()===muajiKy && d.getFullYear()===vitiKy; }).reduce((a,s) => a+(s.total||0), 0);
    const chart7 = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const dStr = d.toISOString().split('T')[0];
      chart7.push({ label: d.toLocaleDateString('sq', {weekday:'short'}), total: shitjet.filter(s=>s.data===dStr).reduce((a,s)=>a+(s.total||0),0) });
    }
    const maxVal = Math.max(...chart7.map(d=>d.total), 1);
    document.getElementById('content').innerHTML = `
      <div class="page-header">
        <div><h1 class="page-title">Mirë se vini, <em>${isAdmin?'Admin':currentUser.email?.split('@')[0]}</em></h1>
        <p class="page-sub">${sot.toLocaleDateString('sq',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card accent"><div class="stat-icon">💰</div><div class="stat-info"><span class="stat-val">${formatMoney(totalSot)}</span><span class="stat-label">Shitjet Sot</span></div></div>
        <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-info"><span class="stat-val">${formatMoney(totalMuaj)}</span><span class="stat-label">Këtë Muaj</span></div></div>
        <div class="stat-card"><div class="stat-icon">🧾</div><div class="stat-info"><span class="stat-val">${shitjetSot.length}</span><span class="stat-label">Fatura Sot</span></div></div>
      </div>
      <div class="chart-section">
        <div class="section-title">7 Ditët e Fundit</div>
        <div class="bar-chart">
          ${chart7.map(d=>`<div class="bar-col"><div class="bar-wrap"><div class="bar-fill" style="height:${(d.total/maxVal*100)}%">${d.total>0?`<span class="bar-tooltip">${formatMoney(d.total)}</span>`:''}</div></div><span class="bar-label">${d.label}</span></div>`).join('')}
        </div>
      </div>
      <div class="recent-section">
        <div class="section-header"><div class="section-title">Shitjet e Fundit</div><button class="link-btn" onclick="shkoTe('shitjet')">Shiko të gjitha →</button></div>
        ${(isAdmin ? shitjet : shitjet.filter(s=>s.data===sotStr)).slice(0,5).map(s=>`<div class="shitje-row">${s.fotoUrl?`<img src="${s.fotoUrl}" class="shitje-foto">`:''}<div class="shitje-info"><strong>${s.produkti}</strong><span>${s.data} • ${s.sasia} ${s.njesia||'cop'} • <span class="punetor-tag">👤 ${s.punetori||'—'}</span></span></div><div class="shitje-total">${formatMoney(s.total)}</div></div>`).join('')||'<div class="empty-state">Nuk ka shitje sot.</div>'}
      </div>`;
  }

  function renderFormaShitjes() {
    const sot = new Date().toISOString().split('T')[0];
    document.getElementById('content').innerHTML = `
      <div class="page-header"><h1 class="page-title">Shitje e Re</h1></div>
      <div class="form-card">
        <div class="form-group"><label>Emri i Produktit / Shërbimit</label>
          <input type="text" id="s-produkti" placeholder="p.sh. Byzylyk, Unazë, Vathë..." autocomplete="off">
        </div>
        <div class="form-row">
          <div class="form-group"><label>Sasia</label><input type="number" id="s-sasia" min="0.01" step="0.01" value="1" oninput="llogaritTotal()"></div>
          <div class="form-group"><label>Çmimi (€)</label><input type="number" id="s-cmimi" min="0" step="0.01" placeholder="0.00" oninput="llogaritTotal()"></div>
          <div class="form-group"><label>Njësia</label><input type="text" id="s-njesia" placeholder="cop, kg, l..."></div>
        </div>
        <div class="form-group"><label>Data</label><input type="date" id="s-data" value="${sot}"></div>
        <div class="form-group">
            <label>Klienti (opsional)</label>
            <input type="text" id="s-klienti" placeholder="Emri i klientit..." autocomplete="off" list="klientet-list">
            <datalist id="klientet-list"></datalist>
          </div>
        <input type="hidden" id="s-pagesa" value="cash">
        <div class="form-group"><label>Shënim (opsional)</label><input type="text" id="s-shen" placeholder="p.sh. Çmim special..."></div>
        <div class="form-group">
          <label>Foto (opsionale)</label>
          <div class="foto-upload-zone">
            <input type="file" id="s-foto" accept="image/*" style="display:none" onchange="shfaqPreview(this)">
            <div id="foto-preview-wrap">
              <span class="foto-icon">📷</span>
              <span class="foto-hint">Zgjidh butonin për foto</span>
            </div>
            <div style="display:flex;gap:8px;margin-top:12px;justify-content:center">
              <button type="button" class="btn-foto" onclick="hapKameren()">📷 Kamera</button>
              <button type="button" class="btn-foto" onclick="hapGalerine()">🖼️ Galeria</button>
            </div>
          </div>
        </div>
        <div class="total-preview"><span>Totali:</span><strong id="total-preview">€ 0.00</strong></div>
        <button class="btn-primary" id="btn-ruaj" onclick="ruajShitjen()">💾 Ruaj Shitjen</button>
      </div>`;
    setTimeout(plotesoDatalistin, 50);
  }

  window.plotesoDatalistin = () => {
    const dl = document.getElementById('klientet-list');
    if (!dl) return;
    const emer = [...new Set(shitjet.filter(s=>s.klienti).map(s=>s.klienti))];
    dl.innerHTML = emer.map(e=>`<option value="${e}">`).join('');
  };

  window.shfaqPreview = (input) => {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('foto-preview-wrap').innerHTML = `
        <img src="${e.target.result}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;">
        <button type="button" onclick="hiqFoton(event)" style="margin-top:8px;background:none;border:1px solid var(--error);color:var(--error);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;">✕ Hiq foton</button>
      `;
    };
    reader.readAsDataURL(file);
  };

  window.hapKameren = () => {
    const input = document.getElementById('s-foto');
    input.removeAttribute('capture');
    input.setAttribute('capture', 'environment');
    input.click();
  };

  window.hapGalerine = () => {
    const input = document.getElementById('s-foto');
    input.removeAttribute('capture');
    input.click();
  };

  window.hiqFoton = (e) => {
    e.stopPropagation();
    document.getElementById('s-foto').value = '';
    document.getElementById('foto-preview-wrap').innerHTML = `
      <span class="foto-icon">📷</span>
      <span class="foto-hint">Kliko për të ngarkuar foto ose bëj foto me kamerë</span>
    `;
  };

  window.llogaritTotal = () => {
    const s = parseFloat(document.getElementById('s-sasia')?.value)||0;
    const c = parseFloat(document.getElementById('s-cmimi')?.value)||0;
    const el = document.getElementById('total-preview');
    if (el) el.textContent = formatMoney(s*c);
  };

  window.ruajShitjen = async () => {
    const produkti = document.getElementById('s-produkti').value.trim();
    const sasia = parseFloat(document.getElementById('s-sasia').value);
    const cmimi = parseFloat(document.getElementById('s-cmimi').value);
    const njesia = document.getElementById('s-njesia').value.trim() || 'cop';
    const data = document.getElementById('s-data').value;
    const shen = document.getElementById('s-shen').value;
    const pagesa = document.getElementById('s-pagesa').value;
    const klienti = document.getElementById('s-klienti').value.trim();
    if (!produkti) return tregogabim("Shkruaj emrin e produktit!");
    if (!sasia||sasia<=0) return tregogabim("Sasia duhet > 0!");
    if (!cmimi||cmimi<=0) return tregogabim("Çmimi duhet > 0!");

    const btn = document.getElementById('btn-ruaj');
    btn.textContent = '⏳ Duke ruajtur...';
    btn.disabled = true;

    let fotoUrl = '';
    const fotoInput = document.getElementById('s-foto');
    if (fotoInput.files && fotoInput.files[0]) {
      try {
        const file = fotoInput.files[0];
        const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
        const emriFoto = `foto/${currentUser.uid}_${Date.now()}.${ext}`;
        const fotoRef = ref(storage, emriFoto);
        const snapshot = await uploadBytes(fotoRef, file);
        fotoUrl = await getDownloadURL(snapshot.ref);
      } catch(e) {
        // Foto deshtoi por ruaj shitjen pa foto
        console.warn("Foto nuk u ngarkua:", e.message);
        tregogabim("⚠️ Foto nuk u ngarkua, por shitja u ruajt!");
      }
    }
    await shtoShitje({ produkti, sasia, cmimi, njesia, data, shen, pagesa, klienti, total: sasia*cmimi, fotoUrl });
    btn.textContent = '💾 Ruaj Shitjen';
    btn.disabled = false;
  };

  function renderShitjet() {
    const grouped = {};
    shitjet.forEach(s => { if (!grouped[s.data]) grouped[s.data]=[]; grouped[s.data].push(s); });
    const rows = Object.entries(grouped).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30);
    document.getElementById('content').innerHTML = `
      <div class="page-header"><h1 class="page-title">Të gjitha Shitjet</h1><button class="btn-primary small" onclick="shkoTe('shito')">+ Shitje e Re</button></div>
      ${!rows.length?'<div class="empty-state">Nuk ka shitje ende.</div>':''}
      ${rows.map(([data,items])=>{
        const dayTotal = items.reduce((a,s)=>a+(s.total||0),0);
        return `<div class="day-group"><div class="day-header"><span>${formatDate(data)}</span><span class="day-total">${formatMoney(dayTotal)}</span></div>

  function renderRaporte() {
    if (!isAdmin) return;
    const sot = new Date();
    const muajiKy = sot.getMonth(), vitiKy = sot.getFullYear();
    const muajet=['Janar','Shkurt','Mars','Prill','Maj','Qershor','Korrik','Gusht','Shtator','Tetor','Nëntor','Dhjetor'];
    const totalGjith = shitjet.reduce((a,s)=>a+(s.total||0),0);

    // === MUAJT ===
    const byMuaj = {};
    shitjet.forEach(s => {
      if (!s.data) return;
      const d = new Date(s.data+'T12:00:00');
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!byMuaj[key]) byMuaj[key] = { total:0, count:0, muaji: d.getMonth(), viti: d.getFullYear() };
      byMuaj[key].total += s.total||0;
      byMuaj[key].count++;
    });
    const muajteSort = Object.entries(byMuaj).sort((a,b)=>b[0].localeCompare(a[0]));

    // === VITET ===
    const byVit = {};
    shitjet.forEach(s => {
      if (!s.data) return;
      const viti = new Date(s.data+'T12:00:00').getFullYear();
      if (!byVit[viti]) byVit[viti] = { total:0, count:0 };
      byVit[viti].total += s.total||0;
      byVit[viti].count++;
    });
    const viteteSort = Object.entries(byVit).sort((a,b)=>b[0]-a[0]);

    // === JAVËT ===
    function getWeekKey(dateStr) {
      const d = new Date(dateStr+'T12:00:00');
      const start = new Date(d);
      start.setDate(d.getDate() - d.getDay() + 1);
      return start.toISOString().split('T')[0];
    }
    const byJava = {};
    shitjet.forEach(s => {
      if (!s.data) return;
      const key = getWeekKey(s.data);
      if (!byJava[key]) byJava[key] = { total:0, count:0, start: key };
      byJava[key].total += s.total||0;
      byJava[key].count++;
    });
    const javaSort = Object.entries(byJava).sort((a,b)=>b[0].localeCompare(a[0]));

    // === TOP PRODUKTET ===
    const byProd={};
    shitjet.forEach(s=>{if(!byProd[s.produkti])byProd[s.produkti]={total:0,count:0};byProd[s.produkti].total+=s.total||0;byProd[s.produkti].count++;});
    const topProd=Object.entries(byProd).sort((a,b)=>b[1].total-a[1].total).slice(0,8);

    // === PUNËTORËT ===
    const byPun={};
    shitjet.forEach(s=>{const k=s.punetori||'—';if(!byPun[k])byPun[k]={total:0,count:0};byPun[k].total+=s.total||0;byPun[k].count++;});

    const tabContent = {
      muaji: `

        ${muajteSort.map(([key,d])=>`
          <div class="top-row">
            <div class="top-info"><strong>${muajet[d.muaji]} ${d.viti}</strong><span>${d.count} shitje</span></div>
            <div class="top-total">${formatMoney(d.total)}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${muajteSort[0][1].total>0?(d.total/muajteSort[0][1].total*100):0}%"></div></div>
          </div>`).join('')||'<div class="empty-state">Nuk ka të dhëna.</div>'}`,

      viti: `
        <div class="section-title" style="margin-bottom:16px">Të ardhurat sipas Vitit</div>
        ${viteteSort.map(([viti,d])=>`
          <div class="top-row">
            <div class="top-info"><strong>${viti}</strong><span>${d.count} shitje</span></div>
            <div class="top-total">${formatMoney(d.total)}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${viteteSort[0][1].total>0?(d.total/viteteSort[0][1].total*100):0}%"></div></div>
          </div>`).join('')||'<div class="empty-state">Nuk ka të dhëna.</div>'}`,

      java: `
        <div class="section-title" style="margin-bottom:16px">Të ardhurat sipas Javës</div>
        ${javaSort.map(([key,d])=>{
          const dStart = new Date(key+'T12:00:00');
          const dEnd = new Date(dStart); dEnd.setDate(dStart.getDate()+6);
          const label = dStart.toLocaleDateString('sq',{day:'numeric',month:'short'}) + ' — ' + dEnd.toLocaleDateString('sq',{day:'numeric',month:'short',year:'numeric'});
          return `<div class="top-row">
            <div class="top-info"><strong>${label}</strong><span>${d.count} shitje</span></div>

          </div>`;
        }).join('')||'<div class="empty-state">Nuk ka të dhëna.</div>'}`,

      produkte: `
        <div class="section-title" style="margin-bottom:16px">Top Produktet / Shërbimet</div>

          <div class="top-row">

            <div class="top-total">${formatMoney(d.total)}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${topProd[0][1].total>0?(d.total/topProd[0][1].total*100):0}%"></div></div>
          </div>`).join('')||'<div class="empty-state">Nuk ka të dhëna.</div>'}`,

      punetore: `

        ${topPun.map(([emri,d])=>`
          <div class="top-row">
            <div class="pun-avatar small">${emri[0]?.toUpperCase()||'?'}</div>
            <div class="top-info"><strong>${emri}</strong><span>${d.count} shitje</span></div>
            <div class="top-total">${formatMoney(d.total)}</div>

          </div>`).join('')||'<div class="empty-state">Nuk ka të dhëna.</div>'}`
    };

    document.getElementById('content').innerHTML = `
      <div class="page-header"><h1 class="page-title">Raporte</h1></div>
      <div class="stats-grid">
        <div class="stat-card accent"><div class="stat-icon">💰</div><div class="stat-info"><span class="stat-val">${formatMoney(muajteSort[0]?.[1]?.total||0)}</span><span class="stat-label">${muajet[muajiKy]} ${vitiKy}</span></div></div>
        <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-info"><span class="stat-val">${formatMoney(muajteSort[1]?.[1]?.total||0)}</span><span class="stat-label">Muaji i Kaluar</span></div></div>
        <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-info"><span class="stat-val">${formatMoney(viteteSort[0]?.[1]?.total||0)}</span><span class="stat-label">Viti ${vitiKy}</span></div></div>
        <div class="stat-card"><div class="stat-icon">🧾</div><div class="stat-info"><span class="stat-val">${formatMoney(totalGjith)}</span><span class="stat-label">Total Gjithsej</span></div></div>
      </div>
      <div class="raporte-tabs">
        <button class="rtab ${raporteTab==='muaji'?'active':''}" onclick="switchRTab('muaji')">📅 Muajt</button>
        <button class="rtab ${raporteTab==='viti'?'active':''}" onclick="switchRTab('viti')">📆 Vitet</button>
        <button class="rtab ${raporteTab==='java'?'active':''}" onclick="switchRTab('java')">🗓️ Javët</button>
        <button class="rtab ${raporteTab==='produkte'?'active':''}" onclick="switchRTab('produkte')">📦 Produktet</button>
        <button class="rtab ${raporteTab==='punetore'?'active':''}" onclick="switchRTab('punetore')">👥 Punëtorët</button>
      </div>
      <div class="chart-section" id="raporte-content">
        ${tabContent[raporteTab]}
      </div>
      <div class="form-card" style="margin-top:20px;border:1px solid rgba(248,113,113,0.2);background:rgba(248,113,113,0.04)">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <span style="font-size:24px">⚠️</span>
          <div>
            <div style="font-weight:700;font-size:15px">Zona e Rrezikshme</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">Shkarko të dhënat si Excel, pastaj fshij gjithçka nga databaza</div>

            🗑️ Fshij të gjitha shitjet
          </button>
        </div>
      </div>`;
  }

  window.ndryshoFjalekalimin = async () => {
    const { updatePassword } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const passRi = document.getElementById('pass-ri').value;
    const passK = document.getElementById('pass-konfirmo').value;
    if (!passRi || passRi.length < 6) return tregogabim("Fjalëkalimi duhet min. 6 karaktere!");
    if (passRi !== passK) return tregogabim("Fjalëkalimet nuk përputhen!");
    try {
      await updatePassword(currentUser, passRi);
      tregosuksese("Fjalëkalimi u ndryshua me sukses! ✓");
      document.getElementById('pass-ri').value = '';
      document.getElementById('pass-konfirmo').value = '';
    } catch(e) {
      if (e.code === 'auth/requires-recent-login') {
        tregogabim("Dilni dhe hyni sërish, pastaj ndryshoni fjalëkalimin!");
      } else {
        tregogabim("Gabim: " + e.message);
      }
    }
  };

    const pagesat = { cash: 'Cash', karte: 'Kartë', transfer: 'Transfer' };
    const headers = ['Data', 'Produkti', 'Sasia', 'Njësia', 'Çmimi (€)', 'Total (€)', 'Metoda Pagesës', 'Klienti', 'Punëtori', 'Shënim'];
    const rows = shitjet
      .sort((a,b) => (b.data||'').localeCompare(a.data||''))
      .map(s => [
        s.data || '',
        s.produkti || '',
        s.sasia || '',
        s.njesia || 'cop',
        (s.cmimi || 0).toFixed(2),
        (s.total || 0).toFixed(2),
        pagesat[s.pagesa] || 'Cash',
        s.klienti || '',
        s.punetori || '',
        s.shen || ''
      ]);

    // Add totals row
    const totalSum = shitjet.reduce((a,s) => a+(s.total||0), 0);
    rows.push(['', '', '', '', 'TOTAL:', totalSum.toFixed(2), '', '', '', '']);

    const csvContent = [headers, ...rows]
      .map(row => row.map(cell => { const v = String(cell).replace(/"/g,'""'); return '"'+v+'"'; }).join(','))
      .join('\r\n');

    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const sot = new Date().toISOString().split('T')[0];
    a.href = url;
    a.download = `DOHA_Accessories_Shitjet_${sot}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    tregosuksese("Excel u shkarkua! ✓");
  };

        <p style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px">Kjo veprim <strong style="color:var(--error)">nuk mund të kthehet</strong>!</p>

        <input type="text" id="konfirmo-input" placeholder="Shkruaj FSHIJ" style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px;text-align:center;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:16px">
        <div style="display:flex;gap:10px">
          <button onclick="this.closest('div[style]').remove()" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif">Anulo</button>
          <button onclick="ekzekutoFshirjen()" style="flex:1;background:var(--error);border:none;border-radius:10px;padding:12px;color:#fff;cursor:pointer;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif">Fshij</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
  };

  window.ekzekutoFshirjen = async () => {
    const input = document.getElementById('konfirmo-input')?.value?.trim();
    if (input !== 'FSHIJ') return tregogabim("Shkruaj saktë: FSHIJ");
    document.querySelector('div[style*="z-index:9999"]')?.remove();
    tregogabim("⏳ Duke fshirë...");
    try {

      for (const s of shitjet) {
        batch.push(deleteDoc(doc(db, 'shitjet', s.id)));

  };

  window.toggleMenu = () => {

  function tregosuksese(msg){showToast(msg,'success');}
